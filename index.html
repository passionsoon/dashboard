// 날짜별 기록 테이블
// ══════════════════════════════════════════════════════
function renderDailyTable(){
  const search=(document.getElementById('date-search')?.value||'').trim();
  const deptFilter=document.getElementById('dept-filter')?.value||'all';
  const rows=[...history].reverse();
  const filtered=rows.filter(r=>{
    if(search&&!r.date.includes(search))return false;
    return true;
  });

  const tbody=document.getElementById('daily-tbody');
  if(!tbody)return;
  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">기록이 없습니다</td></tr>`;
    return;
  }

  // 증감 계산용 (날짜 오름차순 원본)
  const asc=[...history];

  tbody.innerHTML=filtered.map(row=>{
    const idx=asc.findIndex(r=>r.date===row.date);
    const prev=idx>0?asc[idx-1]:null;
    const total=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.unique||0),0);
    const prevTotal=prev?ALL_DEPTS.reduce((s,d)=>s+(prev[d]?.unique||0),0):null;
    const totalDelta=prevTotal!==null?total-prevTotal:null;

    const deptCells=ALL_DEPTS.map(dept=>{
      if(deptFilter!=='all'&&deptFilter!==dept)return'';
      const v=row[dept];
      if(!v||typeof v!=='object')return`<td style="color:var(--muted)">-</td>`;
      const pv=prev?.[dept];
      const diff=pv&&typeof pv==='object'?v.unique-pv.unique:null;
      const diffHtml=diff===null?'':diff>0?`<span class="delta-up"> ▲${diff}</span>`:diff<0?`<span class="delta-down"> ▼${Math.abs(diff)}</span>`:`<span class="delta-same"> →</span>`;
      return`<td style="cursor:pointer" onclick="openDayModal('${row.date}','${dept}')">
        <div style="color:${DEPT_RAW[dept]};font-weight:700">${v.unique}명${diffHtml}</div>
        <div style="font-size:.7rem;margin-top:2px">
          <span style="color:#dc2626">총 ${v.t3||0}</span>
          <span style="color:#d97706;margin:0 3px">주 ${v.t2||0}</span>
          <span style="color:#059669">활 ${v.t1||0}</span>
        </div>
      </td>`;
    }).join('');

    const deltaHtml=totalDelta===null?'':totalDelta>0?`<span class="delta-up"> ▲${totalDelta}</span>`:totalDelta<0?`<span class="delta-down"> ▼${Math.abs(totalDelta)}</span>`:`<span class="delta-same"> →</span>`;

    return`<tr class="daily-row" onclick="openDayModal('${row.date}',null)">
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--text)">${row.date}</td>
      ${deptCells}
      <td style="font-weight:800;color:var(--accent)">${total}명${deltaHtml}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// 모달: 일별 상세 명단
// ══════════════════════════════════════════════════════
function openDayModal(date, deptFocus){
  const row=history.find(r=>r.date===date);
  if(!row)return;
  const idx=history.findIndex(r=>r.date===date);
  const prev=idx>0?history[idx-1]:null;

  document.getElementById('modal-title').textContent=`${date} 전도 현황`;
  const allTabs = ['전체', ...ALL_DEPTS];
  const defaultTab = deptFocus || '전체';
  const tabs=allTabs.map(d=>`<button class="modal-dept-tab${d===defaultTab?' active':''}" onclick="showModalDept('${date}','${d}')" data-dept="${d}">${d==='전체'?'⛪ 전체':d}</button>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-dept-tabs">${tabs}</div>
    <div id="modal-dept-content"></div>`;
  showModalDept(date, defaultTab);
  document.getElementById('modal-overlay').classList.add('open');
}

function showModalDept(date,dept){
  document.querySelectorAll('.modal-dept-tab').forEach(b=>b.classList.toggle('active',b.dataset.dept===dept));
  const row=history.find(r=>r.date===date);
  const idx=history.findIndex(r=>r.date===date);
  const prev=idx>0?history[idx-1]:null;
  const el=document.getElementById('modal-dept-content');

  // 전체 탭 처리
  if(dept==='전체'){
    const totU=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.unique||0),0);
    const totRej=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.재적||0),0);
    const totT3=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.t3||0),0);
    const totT2=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.t2||0),0);
    const totT1=ALL_DEPTS.reduce((s,d)=>s+(row[d]?.t1||0),0);
    const totRes=RESULT_KEYS.reduce((o,k)=>{o[k]=ALL_DEPTS.reduce((s,d)=>s+getRC(row[d]?.results,k),0);return o;},{});
    const prevTotU=prev?ALL_DEPTS.reduce((s,d)=>s+(prev[d]?.unique||0),0):null;
    const prevTotRes=prev?RESULT_KEYS.reduce((o,k)=>{o[k]=ALL_DEPTS.reduce((s,d)=>s+getRC(prev[d]?.results,k),0);return o;},'{}'):null;
    const diffU=prevTotU!==null?totU-prevTotU:null;
    const diffHtml=diffU===null?'':diffU>0?`<span class="delta-up">▲ ${diffU}</span>`:diffU<0?`<span class="delta-down">▼ ${Math.abs(diffU)}</span>`:`<span class="delta-same">→</span>`;
    el.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem">
        <div style="background:#eff4ff;border-radius:12px;padding:1rem;border-left:4px solid #2563eb">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">실질 전도 인원</div>
          <div style="font-size:2rem;font-weight:900;color:#2563eb">${totU}명 ${diffHtml}</div>
          <div style="font-size:.75rem;color:var(--muted)">재적 ${totRej}명 대비 ${pct(totU,totRej)}%</div>
        </div>
        <div style="background:#fef2f2;border-radius:12px;padding:1rem;border-left:4px solid #dc2626">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">총력 활동자</div>
          <div style="font-size:2rem;font-weight:900;color:#dc2626">${totT3}명</div>
          <div style="font-size:.75rem;color:var(--muted)">${pct(totT3,totU)}%</div>
        </div>
        <div style="background:#fffbeb;border-radius:12px;padding:1rem;border-left:4px solid #d97706">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">주력 활동자</div>
          <div style="font-size:2rem;font-weight:900;color:#d97706">${totT2}명</div>
          <div style="font-size:.75rem;color:var(--muted)">${pct(totT2,totU)}%</div>
        </div>
        <div style="background:#ecfdf5;border-radius:12px;padding:1rem;border-left:4px solid #059669">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">활력 활동자</div>
          <div style="font-size:2rem;font-weight:900;color:#059669">${totT1}명</div>
          <div style="font-size:.75rem;color:var(--muted)">${pct(totT1,totU)}%</div>
        </div>
      </div>
      <div style="background:var(--surface2);border-radius:14px;padding:1.2rem;border:1px solid var(--border);margin-bottom:1.2rem;">
        <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:.9rem;letter-spacing:1px;text-transform:uppercase;">📊 전도 프로세스 (전체)</div>
        ${makeResultGrid(totRes, prev ? RESULT_KEYS.reduce((o,k)=>{o[k]=ALL_DEPTS.reduce((s,d)=>s+getRC(prev[d]?.results,k),0);return o;},{}) : null)}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem">
        ${ALL_DEPTS.map(d=>{
          const v=row[d]; if(!v||typeof v!=='object') return `<div style="background:var(--surface2);border-radius:12px;padding:1rem;opacity:.4"><div style="font-weight:700;color:${DEPT_RAW[d]}">${d}</div><div style="color:var(--muted);font-size:.8rem;margin-top:4px">데이터 없음</div></div>`;
          return `<div style="background:var(--surface2);border-radius:12px;padding:1rem;border-top:3px solid ${DEPT_RAW[d]};cursor:pointer" onclick="showModalDept('${date}','${d}')">
            <div style="font-weight:800;color:${DEPT_RAW[d]};font-size:.95rem;margin-bottom:.3rem">${d}</div>
            <div style="font-size:1.3rem;font-weight:900;color:${DEPT_RAW[d]}">${v.unique}명 <span style="font-size:.8rem;opacity:.7">(${pct(v.unique,v.재적)}%)</span></div>
            <div style="font-size:.75rem;margin-top:4px">
              <span style="color:#dc2626">총력 ${v.t3||0}</span>
              <span style="color:#d97706;margin:0 6px">주력 ${v.t2||0}</span>
              <span style="color:#059669">활력 ${v.t1||0}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    return;
  }

  const v=row?.[dept];
  const pv=prev?.[dept];
  if(!v||typeof v!=='object'){el.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--muted)">해당 날짜에 ${dept} 데이터가 없습니다</div>`;return;}

  const color=DEPT_RAW[dept];
  const rate=pct(v.unique,v.재적);

  // 증감 계산
  const diffUnique=pv&&typeof pv==='object'?v.unique-pv.unique:null;
  const diffHtml=diffUnique===null?'':diffUnique>0?`<span class="delta-up">▲ ${diffUnique}</span>`:diffUnique<0?`<span class="delta-down">▼ ${Math.abs(diffUnique)}</span>`:`<span class="delta-same">→ 변동없음</span>`;

  // 명단 증감: 전날 대비 신규/이탈
  const prevT3=new Set(pv?.t3names||[]), prevT2=new Set(pv?.t2names||[]), prevT1=new Set(pv?.t1names||[]);
  const allPrev=new Set([...prevT3,...prevT2,...prevT1]);
  const currT3=new Set(v.t3names||[]), currT2=new Set(v.t2names||[]), currT1=new Set(v.t1names||[]);
  const allCurr=new Set([...currT3,...currT2,...currT1]);
  const newMembers=[...allCurr].filter(n=>!allPrev.has(n));
  const leftMembers=[...allPrev].filter(n=>!allCurr.has(n));
  // 강도 변동
  const upgraded=[...allCurr].filter(n=>allPrev.has(n)&&(
    (prevT1.has(n)&&(currT2.has(n)||currT3.has(n)))||(prevT2.has(n)&&currT3.has(n))
  ));
  const downgraded=[...allCurr].filter(n=>allPrev.has(n)&&(
    (prevT3.has(n)&&(currT2.has(n)||currT1.has(n)))||(prevT2.has(n)&&currT1.has(n))
  ));

  const makeNameTags=(names,bg,tc)=>names.length
    ?names.map(n=>`<span class="name-tag" style="background:${bg};color:${tc}">${n}</span>`).join('')
    :`<span style="color:var(--muted);font-size:.82rem">없음</span>`;

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem">
      <div style="background:${color}15;border-radius:12px;padding:1rem;border-left:4px solid ${color}">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">실질 전도 인원</div>
        <div style="font-size:2rem;font-weight:900;color:${color}">${v.unique}명 ${diffHtml}</div>
        <div style="font-size:.75rem;color:var(--muted)">재적 ${v.재적}명 대비 ${rate}%</div>
      </div>
      <div style="background:#fef2f2;border-radius:12px;padding:1rem;border-left:4px solid #dc2626">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">총력 활동자</div>
        <div style="font-size:2rem;font-weight:900;color:#dc2626">${v.t3||0}명</div>
        <div style="font-size:.75rem;color:var(--muted)">${pct(v.t3||0,v.unique)}%</div>
      </div>
      <div style="background:#fffbeb;border-radius:12px;padding:1rem;border-left:4px solid #d97706">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">주력 활동자</div>
        <div style="font-size:2rem;font-weight:900;color:#d97706">${v.t2||0}명</div>
        <div style="font-size:.75rem;color:var(--muted)">${pct(v.t2||0,v.unique)}%</div>
      </div>
      <div style="background:#ecfdf5;border-radius:12px;padding:1rem;border-left:4px solid #059669">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">활력 활동자</div>
        <div style="font-size:2rem;font-weight:900;color:#059669">${v.t1||0}명</div>
        <div style="font-size:.75rem;color:var(--muted)">${pct(v.t1||0,v.unique)}%</div>
      </div>
    </div>

    <!-- 명단 섹션 -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.2rem">
      <div style="background:var(--총력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#dc2626;letter-spacing:1px;margin-bottom:.5rem">🔴 총력 활동자</div>
        <div class="name-grid">${makeNameTags(v.t3names||[],'rgba(220,38,38,.12)','#dc2626')}</div>
      </div>
      <div style="background:var(--주력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#d97706;letter-spacing:1px;margin-bottom:.5rem">🟡 주력 활동자</div>
        <div class="name-grid">${makeNameTags(v.t2names||[],'rgba(217,119,6,.12)','#d97706')}</div>
      </div>
      <div style="background:var(--활력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#059669;letter-spacing:1px;margin-bottom:.5rem">🟢 활력 활동자</div>
        <div class="name-grid">${makeNameTags(v.t1names||[],'rgba(5,150,105,.1)','#059669')}</div>
      </div>
    </div>

    <!-- 그룹별 명단 -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.2rem">
      ${['센터관리','전도활동','전도단'].map(grp=>`
        <div style="background:var(--surface2);border-radius:12px;padding:1rem;border:1px solid var(--border)">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.5rem">${grp} (${(v.groups?.[grp]||[]).length}명)</div>
          <div class="name-grid">${makeNameTags(v.groups?.[grp]||[],'#e8eaf0','#374151')}</div>
        </div>`).join('')}
    </div>

    <!-- 전도결과 Funnel -->
    <div style="background:var(--surface2);border-radius:14px;padding:1.2rem;border:1px solid var(--border);margin-bottom:1.2rem;">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:.9rem;letter-spacing:1px;text-transform:uppercase;">📊 전도 프로세스</div>
      ${makeResultGrid(v.results, pv && typeof pv==='object' ? pv.results : null)}
    </div>

    ${prev&&typeof pv==='object'?`
    <!-- 전날 대비 변동 -->
    <div style="background:var(--surface2);border-radius:14px;padding:1.2rem;border:1px solid var(--border)">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:1rem;letter-spacing:1px;text-transform:uppercase">전날(${prev.date}) 대비 변동</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.8rem">
        <div>
          <div style="font-size:.72rem;font-weight:700;color:#059669;margin-bottom:.4rem">🆕 신규 진입 (${newMembers.length}명)</div>
          <div class="name-grid">${makeNameTags(newMembers,'rgba(5,150,105,.1)','#059669')}</div>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:700;color:#dc2626;margin-bottom:.4rem">👋 이탈 (${leftMembers.length}명)</div>
          <div class="name-grid">${makeNameTags(leftMembers,'rgba(220,38,38,.1)','#dc2626')}</div>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:.4rem">⬆️ 강도 상승 (${upgraded.length}명)</div>
          <div class="name-grid">${makeNameTags(upgraded,'rgba(37,99,235,.1)','var(--accent)')}</div>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.4rem">⬇️ 강도 하락 (${downgraded.length}명)</div>
          <div class="name-grid">${makeNameTags(downgraded,'rgba(0,0,0,.06)','var(--muted)')}</div>
        </div>
      </div>
    </div>` : `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:1rem">이전 날짜 데이터가 없어 변동 비교를 표시할 수 없습니다</div>`}
  `;
}

// 추이 탭: 부서 카드 클릭 → 해당 기간 부서 명단 모달
function openDeptModal(periodKey,dept,period){
  const rows=history.filter(r=>periodKey_(r.date,period)===periodKey);
  function periodKey_(d,p){return periodKey(d,p);}
  const grouped={[periodKey]:history.filter(r=>{
    if(period==='weekly')return weekStart(r.date)===periodKey;
    if(period==='monthly')return r.date.slice(0,7)===periodKey;
    if(period==='quarterly'){const[y,m]=r.date.split('-').map(Number);return`${y}-Q${Math.ceil(m/3)}`===periodKey;}
    return r.date.slice(0,4)===periodKey;
  })};
  const agg=aggregatePeriod(grouped[periodKey]);
  const v=agg[dept];
  if(!v){return;}
  document.getElementById('modal-title').textContent=`${periodLabel(periodKey,period)} · ${dept}`;
  const rate=pct(v.unique,v.재적);
  const makeNameTags=(names,bg,tc)=>names.length
    ?names.map(n=>`<span class="name-tag" style="background:${bg};color:${tc}">${n}</span>`).join('')
    :`<span style="color:var(--muted);font-size:.82rem">없음</span>`;
  document.getElementById('modal-body').innerHTML=`
    <div style="color:var(--muted);font-size:.8rem;margin-bottom:1.2rem">기간 내 ${v.days}일 평균 · 명단은 기간 내 합집합</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem">
      <div style="background:${DEPT_RAW[dept]}15;border-radius:12px;padding:1rem;border-left:4px solid ${DEPT_RAW[dept]}">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">실질 (평균)</div>
        <div style="font-size:1.8rem;font-weight:900;color:${DEPT_RAW[dept]}">${Math.round(v.unique)}명</div>
        <div style="font-size:.72rem;color:var(--muted)">${rate}%</div>
      </div>
      <div style="background:#fef2f2;border-radius:12px;padding:1rem;border-left:4px solid #dc2626">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">총력 (평균)</div>
        <div style="font-size:1.8rem;font-weight:900;color:#dc2626">${Math.round(v.t3)}명</div>
      </div>
      <div style="background:#fffbeb;border-radius:12px;padding:1rem;border-left:4px solid #d97706">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">주력 (평균)</div>
        <div style="font-size:1.8rem;font-weight:900;color:#d97706">${Math.round(v.t2)}명</div>
      </div>
      <div style="background:#ecfdf5;border-radius:12px;padding:1rem;border-left:4px solid #059669">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.3rem">활력 (평균)</div>
        <div style="font-size:1.8rem;font-weight:900;color:#059669">${Math.round(v.t1)}명</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
      <div style="background:var(--총력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#dc2626;margin-bottom:.5rem">🔴 총력 명단</div>
        <div class="name-grid">${makeNameTags(v.t3names,'rgba(220,38,38,.12)','#dc2626')}</div>
      </div>
      <div style="background:var(--주력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#d97706;margin-bottom:.5rem">🟡 주력 명단</div>
        <div class="name-grid">${makeNameTags(v.t2names,'rgba(217,119,6,.12)','#d97706')}</div>
      </div>
      <div style="background:var(--활력-bg);border-radius:12px;padding:1rem">
        <div style="font-size:.72rem;font-weight:800;color:#059669;margin-bottom:.5rem">🟢 활력 명단</div>
        <div class="name-grid">${makeNameTags(v.t1names,'rgba(5,150,105,.1)','#059669')}</div>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}

// 초기 렌더 (공유 데이터 로드 후)
(async function init() {
  await loadSharedData();
  populateCompareDates();
  if (currentMainTab === 'today') renderToday();
  if (currentMainTab === 'trend') renderTrend(currentPeriod);
  if (currentMainTab === 'daily') renderDailyTable();
  const syncEl = document.getElementById('sync-status');
  if (syncEl) syncEl.innerHTML = '✅ 공유 데이터 연결됨';
})();



</script>
