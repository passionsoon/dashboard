  DAY_KR.forEach((d,i) => dayStats[i] = {label:d, dates:[], totU:[], totT3:[], totT2:[], totT1:[], results:{신규찾기:[],연결:[],육따:[],영따:[],복음방:[],센터확답:[]}});
  history.forEach(row => {
    const d = new Date(row.date + 'T00:00:00');
    const dow = d.getDay();
    const totU  = ALL_DEPTS.reduce((s,dept)=>s+(row[dept]?.unique||0),0);
    const totT3 = ALL_DEPTS.reduce((s,dept)=>{const v=row[dept];return s+(v?v.t3names?v.t3names.length:Array.isArray(v.t3)?v.t3.length:(v.t3||0):0);},0);
    const totT2 = ALL_DEPTS.reduce((s,dept)=>{const v=row[dept];return s+(v?v.t2names?v.t2names.length:Array.isArray(v.t2)?v.t2.length:(v.t2||0):0);},0);
    const totT1 = ALL_DEPTS.reduce((s,dept)=>{const v=row[dept];return s+(v?v.t1names?v.t1names.length:Array.isArray(v.t1)?v.t1.length:(v.t1||0):0);},0);
    dayStats[dow].dates.push(row.date);
    dayStats[dow].totU.push(totU);
    dayStats[dow].totT3.push(totT3);
    dayStats[dow].totT2.push(totT2);
    dayStats[dow].totT1.push(totT1);
    RESULT_KEYS.forEach(k => { dayStats[dow].results[k].push(ALL_DEPTS.reduce((s,dept)=>s+getRC(row[dept]?.results,k),0)); });
  });
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10 : 0;
  const maxU = Math.max(...Object.values(dayStats).map(s=>avg(s.totU)), 1);

          <div style="background:var(--surface2);border-radius:8px;padding:.25rem .6rem;border:1px solid var(--border);font-size:.78rem">활동력 <strong style="color:#7c3aed">${actIdx}</strong><span style="color:var(--muted)">/3.0</span></div>

    </div>`;
  }).filter(Boolean).join('');
  el.innerHTML = `<div style="font-size:.75rem;color:var(--muted);margin-bottom:.8rem;display:flex;gap:1.2rem;flex-wrap:wrap;align-items:center"><span>📊 전체 <strong>${history.length}일</strong> 데이터 · 요일별 평균</span><span><span style="color:#2563eb;font-weight:700">■</span> 월·화·목·금</span><span><span style="color:#dc2626;font-weight:700">■</span> 일·수·토</span></div>${cards}`;
}

function copyWeeklyReport() {
  const el = document.getElementById('weekly-report-text');
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => showToast('복사됨! 텔레그램에 붙여넣으세요'));
}

function openWeeklyReport() {
  const recent = [...history].sort((a,b)=>a.date<b.date?1:-1).slice(0,7).reverse(); // 날짜 오름차순
  if (!recent.length) { showToast('데이터가 없어요','warn'); return; }

  const startDate = recent[0].date;
  const endDate   = recent[recent.length-1].date;
  const latestRow = recent[recent.length-1];

  // 일별 집계
  const totals = recent.map(row => ({
    date: row.date,
    u:  ALL_DEPTS.reduce((s,d)=>s+(row[d]?.unique||0),0),
    t3: ALL_DEPTS.reduce((s,d)=>{const v=row[d];return s+(v?v.t3names?v.t3names.length:Array.isArray(v.t3)?v.t3.length:(v.t3||0):0);},0),
    t2: ALL_DEPTS.reduce((s,d)=>{const v=row[d];return s+(v?v.t2names?v.t2names.length:Array.isArray(v.t2)?v.t2.length:(v.t2||0):0);},0),
    t1: ALL_DEPTS.reduce((s,d)=>{const v=row[d];return s+(v?v.t1names?v.t1names.length:Array.isArray(v.t1)?v.t1.length:(v.t1||0):0);},0),
    results: RESULT_KEYS.reduce((o,k)=>{o[k]=ALL_DEPTS.reduce((s,d)=>s+getRC(row[d]?.results,k),0);return o;},{}),
    row: row
  }));

  const avgU  = Math.round(totals.reduce((s,r)=>s+r.u,0)/totals.length);
  const maxU  = totals.reduce((a,b)=>b.u>a.u?b:a);
  const minU  = totals.filter(r=>r.u>0).reduce((a,b)=>b.u<a.u?b:a,{u:9999,date:'-'});
  const totRej= ALL_DEPTS.reduce((s,d)=>s+(latestRow[d]?.재적||0),0);

  // 전도결과: 신규찾기만 합계, 나머지는 최근값
  const totRes = RESULT_KEYS.reduce((o,k)=>{
    o[k] = k==='신규찾기'
      ? totals.reduce((s,r)=>s+r.results[k],0)
      : ALL_DEPTS.reduce((s,d)=>s+getRC(latestRow[d]?.results,k),0);
    return o;
  },{});

  // 활동력 지수
  const totT3 = totals.reduce((s,r)=>s+r.t3,0)/totals.length;
  const totT2 = totals.reduce((s,r)=>s+r.t2,0)/totals.length;
  const totT1 = totals.reduce((s,r)=>s+r.t1,0)/totals.length;
  const actIdx = totT3+totT2+totT1>0
    ? Math.round((totT3*3+totT2*2+totT1*1)/(totT3+totT2+totT1)*10)/10
    : 0;

  // HTML 보고서 렌더링
  // 일별 바 차트 (최대 기준 비율)
  const maxBarU = Math.max(...totals.map(t=>t.u), 1);
  const dayBars = totals.map(t=>{
    const w = Math.round(t.u/maxBarU*100);
    const day = getDayKr(t.date);
    const dc  = DAY_COLOR[day]||'#374151';
    const t3p = pct(t.t3,t.u), t2p=pct(t.t2,t.u), t1p=pct(t.t1,t.u);
    return '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem">'
      +'<span style="font-size:.72rem;font-family:DM Mono,monospace;color:var(--muted);min-width:58px">'+t.date.slice(5)+'</span>'
      +'<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:'+dc+'18;color:'+dc+';font-size:.65rem;font-weight:800">'+day+'</span>'
      +'<div style="flex:1;height:18px;background:var(--border);border-radius:4px;overflow:hidden;display:flex">'
        +'<div style="width:'+Math.round(t.t3/maxBarU*100)+'%;background:#dc2626;min-width:'+(t.t3?2:0)+'px"></div>'
        +'<div style="width:'+Math.round(t.t2/maxBarU*100)+'%;background:#d97706;min-width:'+(t.t2?2:0)+'px"></div>'
        +'<div style="width:'+Math.round(t.t1/maxBarU*100)+'%;background:#059669;min-width:'+(t.t1?2:0)+'px"></div>'
      +'</div>'
      +'<span style="font-size:.82rem;font-weight:800;font-family:DM Mono,monospace;color:#374151;min-width:32px;text-align:right">'+t.u+'명</span>'
      +'<span style="font-size:.68rem;color:var(--muted)">총'+t3p+'% 주'+t2p+'% 활'+t1p+'%</span>'
    +'</div>';
  }).join('');

  // 부서별 상세
  const deptCards = ALL_DEPTS.map(dept=>{
    const dRows = totals.filter(t=>t.row[dept]&&t.row[dept].unique>0);
    const color = DEPT_RAW[dept];
    if (!dRows.length) return '<div style="flex:1;min-width:140px;background:var(--surface2);border-radius:10px;padding:.8rem;border-top:3px solid #e5e7eb;opacity:.5"><div style="font-weight:700;font-size:.85rem;color:var(--muted)">'+dept+'</div><div style="font-size:.75rem;color:var(--muted);margin-top:.3rem">보고 없음</div></div>';
    const avg = Math.round(dRows.reduce((s,r)=>s+(r.row[dept].unique||0),0)/dRows.length);
    const rejeok = dRows[0].row[dept].재적||0;
    const lt = dRows[dRows.length-1].row[dept];
    // history 구조: t3names(배열) 또는 t3(숫자) 또는 t3(배열)
    const t3n = lt.t3names ? lt.t3names.length : (Array.isArray(lt.t3) ? lt.t3.length : (lt.t3||0));
    const t2n = lt.t2names ? lt.t2names.length : (Array.isArray(lt.t2) ? lt.t2.length : (lt.t2||0));
    const t1n = lt.t1names ? lt.t1names.length : (Array.isArray(lt.t1) ? lt.t1.length : (lt.t1||0));
    const idx = t3n+t2n+t1n>0?Math.round((t3n*3+t2n*2+t1n*1)/(t3n+t2n+t1n)*10)/10:0;
    return '<div style="flex:1;min-width:140px;background:var(--surface2);border-radius:10px;padding:.8rem;border-top:3px solid '+color+'">'
      +'<div style="font-weight:800;font-size:.88rem;color:'+color+'">'+dept+'</div>'
      +'<div style="font-size:1.2rem;font-weight:900;color:'+color+';margin:.2rem 0">'+avg+'명 <span style="font-size:.72rem;opacity:.7">평균 (재적 '+pct(avg,rejeok)+'%)</span></div>'
      +'<div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem">'+dRows.length+'일 보고 · 지수 '+idx+'</div>'
      +'<div style="display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px">'
        +'<div style="flex:'+t3n+';background:#dc2626;min-width:'+(t3n?2:0)+'px"></div>'
        +'<div style="flex:'+t2n+';background:#d97706;min-width:'+(t2n?2:0)+'px"></div>'
        +'<div style="flex:'+t1n+';background:#059669;min-width:'+(t1n?2:0)+'px"></div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;font-size:.68rem;margin-top:3px">'
        +'<span style="color:#dc2626">총력 '+t3n+'</span>'
        +'<span style="color:#d97706">주력 '+t2n+'</span>'
        +'<span style="color:#059669">활력 '+t1n+'</span>'
      +'</div>'
    +'</div>';
  }).join('');

  // 전도결과 퍼널
  const funnelColors = ['#2563eb','#7c3aed','#b45309','#0369a1','#047857','#be185d'];
  const funnelLabels = ['신규찾기','연결','육따','영따','복방','확답'];
  const funnelNotes  = ['7일 합계','현재 보유','현재 보유','현재 보유','현재 보유','현재 보유'];
  const maxFunnel = Math.max(...RESULT_KEYS.map(k=>totRes[k]),1);
  const funnelBars = RESULT_KEYS.map((k,i)=>{
    const v = totRes[k];
    const w = Math.round(v/maxFunnel*100);
    return '<div style="margin-bottom:.5rem">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:2px">'
        +'<span style="font-size:.78rem;font-weight:700;color:'+funnelColors[i]+'">'+funnelLabels[i]+'</span>'
        +'<span style="font-size:.78rem;font-weight:900;color:'+funnelColors[i]+';font-family:DM Mono,monospace">'+v+'명 <span style="font-size:.65rem;color:var(--muted);font-weight:400">'+funnelNotes[i]+'</span></span>'
      +'</div>'
      +'<div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">'
        +'<div style="height:100%;width:'+w+'%;background:'+funnelColors[i]+';border-radius:4px;transition:width .5s"></div>'
      +'</div>'
    +'</div>';
  }).join('');

  // 텔레그램 복사용 텍스트
  const copyText = [
    '📊 전도활동 주간보고 ('+startDate+' ~ '+endDate+')',
    '━━━━━━━━━━━━━━━━━━━━━━━━',
    '📈 교회 전체 (재적 '+totRej+'명)',
    '• 일평균 실질인원: '+avgU+'명 (재적 '+pct(avgU,totRej)+'%)',
    '• 최고: '+maxU.date+' '+maxU.u+'명',
    '• 최저: '+minU.date+' '+minU.u+'명',
    '• 활동력지수: '+actIdx+' / 3.0',
    '',
    '📋 부서별 평균',
    ...ALL_DEPTS.map(dept=>{
      const dRows=totals.filter(t=>t.row[dept]&&t.row[dept].unique>0);
      if(!dRows.length) return '• '+dept+': 보고 없음';
      const avg=Math.round(dRows.reduce((s,r)=>s+(r.row[dept].unique||0),0)/dRows.length);
      const rej=dRows[0].row[dept].재적||0;
      const lt=dRows[dRows.length-1].row[dept];
      const t3n=Array.isArray(lt.t3)?lt.t3.length:(lt.t3||0);
      const t2n=Array.isArray(lt.t2)?lt.t2.length:(lt.t2||0);
      const t1n=Array.isArray(lt.t1)?lt.t1.length:(lt.t1||0);
      return '• '+dept+': 평균 '+avg+'명 (재적 '+pct(avg,rej)+'%) | 총력 '+t3n+' 주력 '+t2n+' 활력 '+t1n+' | '+dRows.length+'일 보고';
    }),
    '',
    '📶 전도결과',
    '• 신규찾기: '+totRes['신규찾기']+'명 (7일 합계)',
    '• 연결: '+totRes['연결']+'명 (현재 보유)',
    '• 육따: '+totRes['육따']+'명 (현재 보유)',
    '• 영따: '+totRes['영따']+'명 (현재 보유)',
    '• 복음방: '+totRes['복음방']+'명 (현재 보유)',
    '• 센터확답: '+totRes['센터확답']+'명 (현재 보유)',
    '━━━━━━━━━━━━━━━━━━━━━━━━'
  ].join('\n');

  document.getElementById('modal-title').textContent = '주간 보고서 ('+startDate+' ~ '+endDate+')';
  document.getElementById('modal-body').innerHTML =
    // ── 전체 요약 ──
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.6rem;margin-bottom:1.2rem">'
      +'<div style="background:#eff4ff;border-radius:10px;padding:.8rem;border-left:3px solid #2563eb;text-align:center">'
        +'<div style="font-size:.7rem;color:var(--muted)">일평균 실질인원</div>'
        +'<div style="font-size:1.6rem;font-weight:900;color:#2563eb">'+avgU+'명</div>'
        +'<div style="font-size:.7rem;color:var(--muted)">재적대비 '+pct(avgU,totRej)+'%</div>'
      +'</div>'
      +'<div style="background:#fef2f2;border-radius:10px;padding:.8rem;border-left:3px solid #dc2626;text-align:center">'
        +'<div style="font-size:.7rem;color:var(--muted)">신규찾기 (7일)</div>'
        +'<div style="font-size:1.6rem;font-weight:900;color:#dc2626">'+totRes['신규찾기']+'명</div>'
        +'<div style="font-size:.7rem;color:var(--muted)">일평균 '+Math.round(totRes['신규찾기']/recent.length)+'명</div>'
      +'</div>'
      +'<div style="background:#ecfdf5;border-radius:10px;padding:.8rem;border-left:3px solid #059669;text-align:center">'
        +'<div style="font-size:.7rem;color:var(--muted)">연결 (현재)</div>'
        +'<div style="font-size:1.6rem;font-weight:900;color:#059669">'+totRes['연결']+'명</div>'
        +'<div style="font-size:.7rem;color:var(--muted)">복방 '+totRes['복음방']+' 확답 '+totRes['센터확답']+'</div>'
      +'</div>'
      +'<div style="background:#f5f3ff;border-radius:10px;padding:.8rem;border-left:3px solid #7c3aed;text-align:center">'
        +'<div style="font-size:.7rem;color:var(--muted)">활동력지수 (평균)</div>'
        +'<div style="font-size:1.6rem;font-weight:900;color:#7c3aed">'+actIdx+'</div>'
        +'<div style="font-size:.7rem;color:var(--muted)">최대 3.0</div>'
      +'</div>'
    +'</div>'

    // ── 일별 현황 ──
    +'<div style="background:var(--surface2);border-radius:12px;padding:1rem;margin-bottom:1rem;border:1px solid var(--border)">'
      +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.7rem">📅 일별 실질 인원</div>'
      +dayBars
    +'</div>'

    // ── 부서별 카드 ──
    +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem">🏢 부서별 현황</div>'
    +'<div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem">'+deptCards+'</div>'

    // ── 전도결과 퍼널 ──
    +'<div style="background:var(--surface2);border-radius:12px;padding:1rem;margin-bottom:1rem;border:1px solid var(--border)">'
      +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem">📶 전도 프로세스 현황</div>'
      +funnelBars
    +'</div>'

    // ── 텔레그램 복사 ──
    +'<div style="background:var(--surface2);border-radius:12px;padding:1rem;border:1px solid var(--border)">'
      +'<div style="font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.5rem">📋 텔레그램 복사용 텍스트</div>'
      +'<textarea id="weekly-report-text" readonly style="width:100%;height:160px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.7rem;font-family:DM Mono,monospace;font-size:.75rem;line-height:1.8;resize:none;color:var(--text)">'+copyText+'</textarea>'
      +'<div style="margin-top:.6rem;text-align:right">'
        +'<button onclick="copyWeeklyReport()" style="padding:.55rem 1.2rem;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:.88rem;font-weight:700;cursor:pointer">📋 텔레그램 복사</button>'
      +'</div>'
    +'</div>';

  document.getElementById('modal-overlay').classList.add('open');
}

function openMemberSearch() {
  document.getElementById('modal-title').textContent = '사명자 개인 추적';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;gap:.6rem;margin-bottom:1rem">
      <input type="text" id="member-search-input" placeholder="이름 입력 (예: 이길봉)"
        style="flex:1;padding:.6rem 1rem;border-radius:10px;border:1.5px solid var(--border);font-size:.9rem;font-family:inherit;outline:none"
        onkeydown="if(event.key==='Enter')searchMember()">
      <button onclick="searchMember()" style="padding:.6rem 1.2rem;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:.9rem;font-weight:700;cursor:pointer">검색</button>
    </div>
    <div id="member-result"></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('member-search-input')?.focus(), 100);
}

function searchMember() {
  const name = (document.getElementById('member-search-input')?.value||'').trim();
  const el = document.getElementById('member-result');
  if (!name) { el.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">이름을 입력하세요</div>'; return; }

  const GRP_SHORT = {센터관리:'센',전도활동:'전',전도단:'단'};
  const TIER_MAP = {총력:{color:'#dc2626',bg:'#fef2f2'},주력:{color:'#d97706',bg:'#fffbeb'},활력:{color:'#059669',bg:'#ecfdf5'}};

  const rows = [];
  [...history].sort((a,b)=>a.date<b.date?1:-1).forEach(row => {
    ALL_DEPTS.forEach(dept => {
      const v = row[dept];
      if (!v || typeof v !== 'object') return;
      const inGroups = ['센터관리','전도활동','전도단'].filter(g=>(v.groups?.[g]||[]).includes(name));
      if (!inGroups.length) return;
      const tier = (v.t3names||[]).includes(name)?'총력':(v.t2names||[]).includes(name)?'주력':(v.t1names||[]).includes(name)?'활력':null;
      rows.push({ date:row.date, dept, inGroups, tier });
    });
  });

  if (!rows.length) {
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted)">「${name}」 님의 기록이 없어요</div>`;
    return;
  }

  // 통계
  const totalDays = rows.length;
  const tierCounts = {총력:0,주력:0,활력:0};
  rows.forEach(r => { if(r.tier) tierCounts[r.tier]++; });
  const deptCounts = {};
  rows.forEach(r => { deptCounts[r.dept]=(deptCounts[r.dept]||0)+1; });

  const statHtml = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.6rem;margin-bottom:1rem">
      <div style="background:#eff4ff;border-radius:10px;padding:.7rem;text-align:center;border-left:3px solid #2563eb">
        <div style="font-size:.7rem;color:var(--muted)">총 활동일</div>
        <div style="font-size:1.4rem;font-weight:900;color:#2563eb">${totalDays}일</div>
      </div>
      <div style="background:#fef2f2;border-radius:10px;padding:.7rem;text-align:center;border-left:3px solid #dc2626">
        <div style="font-size:.7rem;color:var(--muted)">총력</div>
        <div style="font-size:1.4rem;font-weight:900;color:#dc2626">${tierCounts.총력}일</div>
      </div>
      <div style="background:#fffbeb;border-radius:10px;padding:.7rem;text-align:center;border-left:3px solid #d97706">
        <div style="font-size:.7rem;color:var(--muted)">주력</div>
        <div style="font-size:1.4rem;font-weight:900;color:#d97706">${tierCounts.주력}일</div>
      </div>
      <div style="background:#ecfdf5;border-radius:10px;padding:.7rem;text-align:center;border-left:3px solid #059669">
        <div style="font-size:.7rem;color:var(--muted)">활력</div>
        <div style="font-size:1.4rem;font-weight:900;color:#059669">${tierCounts.활력}일</div>
      </div>
    </div>`;

  const timelineHtml = rows.map(r => {
    const t = r.tier ? TIER_MAP[r.tier] : {color:'var(--muted)',bg:'var(--surface2)'};
    const grpTags = r.inGroups.map(g=>`<span style="font-size:.65rem;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:1px 5px">${GRP_SHORT[g]}</span>`).join(' ');
    return `<div style="display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-bottom:1px solid var(--border)">

function openLeaderStats() {
  document.getElementById('modal-title').textContent = '인도자별 결실 현황';

  // history 전체에서 results.names 파싱
  const leaderMap = {}; // {인도자명: {찾기:0, 연결:0, ...}}
  const KEY_LABEL = {신규찾기:'찾기',연결:'연결',육따:'육따',영따:'영따',복음방:'복방',센터확답:'확답'};

  history.forEach(row => {
    ALL_DEPTS.forEach(dept => {
      const v = row[dept];
      if (!v || typeof v !== 'object') return;
      RESULT_KEYS.forEach(k => {
        const res = v.results?.[k];
        const names = res?.names || [];
        names.forEach(nameWithLeader => {
          // "이름(인도자)" 형태 파싱
          const m = nameWithLeader.match(/\(([^)]+)\)/);
          if (!m) return;
          const leader = m[1].trim();
          if (!leaderMap[leader]) leaderMap[leader] = {total:0};
          leaderMap[leader][k] = (leaderMap[leader][k]||0) + 1;
          leaderMap[leader].total++;
        });
      });
    });
  });

  const sorted = Object.entries(leaderMap).sort((a,b)=>b[1].total-a[1].total);
  if (!sorted.length) {
    document.getElementById('modal-body').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted)">아직 인도자 데이터가 없어요<br><small>결과보고에 (인도자) 형태로 기재된 경우만 집계됩니다</small></div>';
    document.getElementById('modal-overlay').classList.add('open');
    return;
  }

  const maxTotal = sorted[0][1].total;
  const rows = sorted.map(([leader, counts]) => {
    const barW = Math.round(counts.total/maxTotal*100);
    const resCells = RESULT_KEYS.map(k=>`<td style="text-align:center;padding:.5rem .3rem;font-family:DM Mono,monospace;font-size:.85rem;font-weight:700;color:${counts[k]?'#059669':'#d1d5db'}">${counts[k]||'-'}</td>`).join('');
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:.6rem 1rem;font-weight:700;white-space:nowrap">
        ${leader}
        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden">
          <div style="height:100%;width:${barW}%;background:var(--accent);border-radius:2px"></div>
        </div>
      </td>
      <td style="text-align:center;padding:.5rem .3rem;font-family:DM Mono,monospace;font-size:1rem;font-weight:900;color:var(--accent)">${counts.total}</td>
      ${resCells}
    </tr>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:.8rem">📌 결과보고에서 (인도자) 형태로 기재된 데이터를 집계합니다</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;min-width:500px">
      <thead><tr style="border-bottom:2px solid var(--border)">
        <th style="padding:.6rem 1rem;text-align:left;font-size:.72rem;color:var(--muted);font-weight:700">인도자</th>
        <th style="text-align:center;padding:.6rem .3rem;font-size:.72rem;color:var(--accent);font-weight:700">총계</th>
        ${RESULT_KEYS.map(k=>`<th style="text-align:center;padding:.6rem .3rem;font-size:.68rem;color:var(--muted);font-weight:700">${KEY_LABEL[k]}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

let goals = {};
try { goals = JSON.parse(localStorage.getItem('goals')||'{}'); } catch(e) {}
const DEFAULT_GOAL_RATE = 25;

let rejeokOverride = {};
try { rejeokOverride = JSON.parse(localStorage.getItem('rejeokOverride')||'{}'); } catch(e) {}

function saveRejeok() { localStorage.setItem('rejeokOverride', JSON.stringify(rejeokOverride)); }


function applyGoals() {
  // 공통/부서별 모두 저장
  ALL_DEPTS.forEach(function(dept) {
    var gEl = document.getElementById('goal-'+dept);
    if (gEl) goals[dept] = parseInt(gEl.value) || 25;
    var rEl = document.getElementById('rej-'+dept);
    if (rEl) { var r = parseInt(rEl.value)||0; if(r>0) rejeokOverride[dept]=r; else delete rejeokOverride[dept]; }
  });
  localStorage.setItem('goals', JSON.stringify(goals));
  saveRejeok();

  // 현재 활성 탭의 rates/finalGoal 저장
  if (!processGoals.deptGoals) processGoals.deptGoals = {};
  ['전체(공통)', ...ALL_DEPTS].forEach(function(dept) {
    var finalEl = document.getElementById('gfinal-'+dept);
    if (!finalEl) return;
    var rates = DEFAULT_RATES.map(function(def, i) {
      return parseInt((document.getElementById('grate-'+dept+'-'+i)||{value:def}).value) || def;
    });
    var finalGoal = parseInt(finalEl.value) || 0;
    if (dept === '전체(공통)') {
      processGoals.rates = rates;
      processGoals.finalGoal = finalGoal;
    } else {
      processGoals.deptGoals[dept] = { rates: rates, finalGoal: finalGoal };
    }
  });
  saveProcessGoals();
  closeModalDirect();
  showToast('목표가 저장되었습니다');
  renderToday();
}

function deleteDeptData(date, dept) {
  if (!confirm(`${date} ${dept} 데이터를 삭제할까요?`)) return;
  const idx = history.findIndex(r => r.date === date);
  if (idx === -1) return;
  delete history[idx][dept];
  saveSharedData();
  showToast(`${dept} 데이터 삭제됨`);
  closeModalDirect();
  renderDailyTable();
}

function deleteDate(date) {
  if (!confirm(`${date} 전체 데이터를 삭제할까요?`)) return;
  history = history.filter(r => r.date !== date);
  saveSharedData();
  showToast(`${date} 삭제됨`);
  closeModalDirect();
  renderDailyTable();
}

function showToast(msg, type) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:'+(type==='warn'?'#d97706':'#059669')+';color:#fff;padding:.8rem 1.4rem;border-radius:12px;font-weight:700;font-size:.9rem;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); }, 2500);
}

      + rateInputs
      + funnelPreview
    + '</div>';
}

function previewFunnel(dept) {
  dept = dept || '전체(공통)';
  var finalGoal = parseInt((document.getElementById('gfinal-'+dept)||{value:'0'}).value) || 0;
  var rates = DEFAULT_RATES.map(function(def, i) {
    return parseInt((document.getElementById('grate-'+dept+'-'+i)||{value:def}).value) || def;
  });
  var el = document.getElementById('funnel-preview-'+dept);
  if (!el) return;
  if (!finalGoal) { el.innerHTML = '<span style="color:var(--muted)">센터확답 목표를 입력하세요</span>'; return; }
  var req = calcRequiredByStage(finalGoal, rates);
  var labels = ['신규찾기','연결','육따','영따','복음방','센터확답'];
  var colors = ['#2563eb','#7c3aed','#b45309','#0369a1','#047857','#be185d'];
  el.innerHTML = '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem">'
    + labels.map(function(l,i) {
        return '<div style="background:'+colors[i]+'12;border:1px solid '+colors[i]+'33;border-radius:8px;padding:.3rem .6rem;text-align:center">'
          + '<div style="font-size:.62rem;color:'+colors[i]+';font-weight:700">'+l+'</div>'
          + '<div style="font-size:.95rem;font-weight:900;color:'+colors[i]+';font-family:DM Mono,monospace">'+req[i]+'</div>'
        + '</div>';
      }).join('')
  + '</div>';
}



;



</script>
