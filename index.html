<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전도활동 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>


:root{
  --bg:#f0f2f7; --surface:#fff; --surface2:#f7f8fc; --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.13);
  --text:#1a1d2e; --muted:#7b82a0; --accent:#2563eb; --accent-light:#eff4ff;
  --자문:#6d4aff; --자문-bg:#f1eeff; --장년:#0ea871; --장년-bg:#e8faf2;
  --부녀:#e8407a; --부녀-bg:#feeef5; --청년:#e07b00; --청년-bg:#fff5e6;
  --총력:#dc2626; --총력-bg:#fef2f2; --주력:#d97706; --주력-bg:#fffbeb; --활력:#059669; --활력-bg:#ecfdf5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:2rem;}
/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.logo{font-size:1.8rem;font-weight:900;letter-spacing:-1px;}
.logo span{color:var(--accent);}
.date-badge{font-family:'DM Mono',monospace;font-size:.9rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.45rem 1.1rem;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
/* ── 메인 탭 ── */
.main-tabs{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--surface);padding:.5rem;border-radius:14px;border:1px solid var(--border);width:fit-content;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.main-tab{padding:.6rem 1.6rem;border-radius:10px;font-size:.95rem;font-weight:700;border:none;cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--muted);}
.main-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
/* ── 입력 섹션 ── */
.input-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:2rem;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.input-label{font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
.dept-tabs{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap;}
.dept-tab{padding:.5rem 1.3rem;border-radius:999px;font-size:.9rem;font-weight:600;border:2px solid transparent;cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;}
.dept-tab[data-dept="자문회"]{color:var(--자문);border-color:var(--자문);background:var(--자문-bg);}
.dept-tab[data-dept="장년회"]{color:var(--장년);border-color:var(--장년);background:var(--장년-bg);}
.dept-tab[data-dept="부녀회"]{color:var(--부녀);border-color:var(--부녀);background:var(--부녀-bg);}
.dept-tab[data-dept="청년회"]{color:var(--청년);border-color:var(--청년);background:var(--청년-bg);}
.dept-tab.active[data-dept="자문회"]{background:var(--자문);color:#fff;}
.dept-tab.active[data-dept="장년회"]{background:var(--장년);color:#fff;}
.dept-tab.active[data-dept="부녀회"]{background:var(--부녀);color:#fff;}
.dept-tab.active[data-dept="청년회"]{background:var(--청년);color:#fff;}
textarea{width:100%;height:200px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;line-height:1.8;padding:1.1rem;resize:vertical;transition:border-color .2s;outline:none;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--muted);}
.btn-row{display:flex;gap:.7rem;margin-top:1.2rem;flex-wrap:wrap;}
.btn{padding:.7rem 1.7rem;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;border:none;transition:all .18s;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25);}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-secondary{background:var(--surface2);color:var(--muted);border:1.5px solid var(--border2);}
.btn-secondary:hover{color:var(--text);border-color:var(--accent);}
.btn-danger{background:#fff0f0;color:#dc2626;border:1.5px solid #fca5a5;}
.btn-danger:hover{background:#dc2626;color:#fff;}
.parse-preview{margin-top:1.2rem;background:#eff4ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:1.1rem;font-size:.85rem;display:none;}
.parse-preview-title{color:var(--accent);font-weight:700;margin-bottom:.6rem;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;}
.parse-row{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:.35rem;color:var(--muted);}
.parse-row strong{color:var(--text);}
/* ── 대시보드 통계 ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:1.8rem 1.6rem;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:transform .18s;}
.stat-card:hover{transform:translateY(-3px);}
.stat-label{font-size:.78rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:.6rem;text-transform:uppercase;}
.stat-num{font-size:3rem;font-weight:900;line-height:1;letter-spacing:-1px;}
.stat-sub{font-size:.78rem;color:var(--muted);margin-top:.5rem;}
/* ── 부서 카드 ── */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;margin-bottom:2rem;}
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .18s;}
.dept-card:hover{transform:translateY(-3px);}
.dept-header{padding:1.3rem 1.6rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.dept-name{font-size:1.2rem;font-weight:900;letter-spacing:-.5px;}
.dept-badge{font-size:.82rem;font-weight:500;padding:.3rem .9rem;border-radius:999px;}
.dept-body{padding:1.4rem 1.6rem;}
.group-row{padding:.7rem 0;border-bottom:1px solid var(--border);}
.group-row:last-of-type{border-bottom:none;}
.group-top{display:flex;align-items:center;justify-content:space-between;}
.group-name{font-size:.9rem;font-weight:600;color:var(--muted);}
.group-count{font-size:1.05rem;font-weight:900;font-family:'DM Mono',monospace;}
.unique-row{margin-top:1rem;padding:1.1rem 1.2rem;border-radius:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.unique-label{font-size:.9rem;font-weight:700;}
.unique-sub{font-size:.75rem;margin-top:3px;opacity:.75;line-height:1.6;}
.unique-num{font-size:2.2rem;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:-1px;}
.intensity-section{margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1.2rem;display:flex;flex-direction:column;gap:.9rem;}
.intensity-block{border-radius:12px;padding:.9rem 1rem;}
.intensity-header{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap;}
.intensity-badge{font-size:.72rem;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:999px;}
.intensity-cnt{font-size:.82rem;font-family:'DM Mono',monospace;font-weight:700;margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.intensity-names{display:flex;flex-wrap:wrap;gap:5px;}
.i-chip{font-size:.8rem;padding:3px 10px;border-radius:7px;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.i-chip-grp{font-size:.65rem;opacity:.7;font-weight:400;}
/* ── 결과 테이블 ── */
.result-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:1.5rem;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.section-title{font-size:.85rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);margin-bottom:1.2rem;opacity:.6;}
.summary-table{width:100%;border-collapse:collapse;font-size:.9rem;}
.summary-table th{text-align:left;padding:.7rem 1rem;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;}
.summary-table td{padding:.9rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.summary-table tr:last-child td{border-bottom:none;background:#f8faff;font-weight:700;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:70px;}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease;}
/* ── 추이 탭 ── */
.trend-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.period-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.period-tab{padding:.5rem 1.4rem;border-radius:10px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border);}
.period-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* ── 날짜 검색 ── */
.search-bar{display:flex;gap:.8rem;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.search-bar input{padding:.6rem 1rem;border-radius:10px;border:1.5px solid var(--border);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;background:var(--surface2);}
.search-bar input:focus{border-color:var(--accent);}
/* ── 기간 카드 ── */
.period-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:1.4rem;margin-bottom:1.2rem;transition:box-shadow .2s;}
.period-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.period-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;cursor:pointer;}
.period-label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.period-title{font-size:1.15rem;font-weight:900;color:var(--text);margin-top:2px;}
.period-meta{font-size:.75rem;color:var(--muted);margin-top:3px;}
.period-total{text-align:right;}
.period-total-num{font-size:2.2rem;font-weight:900;color:var(--accent);line-height:1;}
.period-total-sub{font-size:.72rem;color:var(--muted);}
.tier-summary-bar{margin:1rem 0;}
.tier-bar-track{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px;margin-top:4px;}
.tier-seg{height:100%;border-radius:4px;transition:flex .5s;}
/* tier-labels removed - moved below bar */
/* ── 부서별 미니카드 그리드 ── */
.mini-dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.8rem;margin-top:1rem;}
.mini-dept-card{background:var(--surface);border-radius:12px;padding:1rem;border:1px solid var(--border);border-top-width:3px;transition:box-shadow .18s;cursor:pointer;}
.mini-dept-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);}
.mini-dept-name{font-size:.9rem;font-weight:800;margin-bottom:.4rem;}
.mini-dept-unique{font-size:1.4rem;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.mini-dept-rate{font-size:.72rem;color:var(--muted);margin-top:2px;}
.mini-tier-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin-top:.5rem;}
.mini-tier-nums{display:flex;justify-content:space-between;font-size:.68rem;margin-top:4px;}
/* ── 일별 상세 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px;padding:2rem;max-width:900px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);margin:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--border);}
.modal-title{font-size:1.3rem;font-weight:900;}
.modal-close{background:var(--surface2);border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.modal-close:hover{background:var(--border);color:var(--text);}
.modal-dept-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.modal-dept-tab{padding:.4rem 1rem;border-radius:8px;font-size:.85rem;font-weight:600;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.modal-dept-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.name-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:.6rem;}
.name-tag{padding:4px 12px;border-radius:8px;font-size:.82rem;font-weight:600;}
/* ── 날짜 기록 테이블 ── */
.daily-row{cursor:pointer;transition:background .15s;}
.daily-row:hover{background:#f0f4ff !important;}
/* ── 증감 배지 ── */
.delta-up{color:#059669;font-size:.75rem;font-weight:700;}
.delta-down{color:#dc2626;font-size:.75rem;font-weight:700;}
.delta-same{color:var(--muted);font-size:.75rem;}
/* ── 빈 상태 ── */
.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty-icon{font-size:3.5rem;margin-bottom:1.2rem;}
.empty-text{font-size:1rem;line-height:2;}
/* ── SVG 차트 ── */
.chart-wrap{overflow-x:auto;margin-top:1rem;}
@media(max-width:768px){
  body{padding:.8rem;}
  .header{flex-wrap:wrap;gap:.5rem;}
  .logo{font-size:1.4rem;}
  .main-tabs{width:100%;overflow-x:auto;flex-wrap:nowrap;padding:.4rem;}
  .main-tab{padding:.5rem .9rem;font-size:.82rem;white-space:nowrap;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .stat-num{font-size:2rem;}
  .dept-grid{grid-template-columns:1fr;}
  .dept-card .intensity-names{display:flex;flex-wrap:wrap;}
  .modal{padding:1.2rem;margin:.5rem;}
  .modal-overlay{padding:.5rem;}
  .result-section{padding:1rem;}
  .period-tabs{flex-wrap:wrap;gap:.4rem;}
  .period-tab{font-size:.8rem;padding:.4rem .9rem;}
  /* 테이블 가로 스크롤 */
  .summary-table{font-size:.8rem;}
  .summary-table th,.summary-table td{padding:.5rem .4rem;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-num{font-size:1.7rem;}
  .main-tab{padding:.4rem .7rem;font-size:.78rem;}
  .btn{padding:.55rem 1rem;font-size:.82rem;}
  .dept-tabs{gap:.4rem;}
  .dept-tab{padding:.4rem .9rem;font-size:.82rem;}
  #compare-date, #view-date, #report-date{font-size:.82rem;padding:.4rem .6rem;}
}
/* ── 전도결과 섹션 ── */
.result-funnel-wrap{margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1rem;}
.result-funnel-title{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem;}


</style>
</head>
<body>

<div class="header">
  <div class="logo">전도활동<span>대시보드</span></div>
  <div style="display:flex;align-items:center;gap:.6rem;">
    <span id="sync-status" style="font-size:.75rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.3rem .8rem;border-radius:999px;display:flex;align-items:center;gap:4px;">🔄 동기화 중...</span>
    <button onclick="manualRefresh()" title="최신 데이터 다시 불러오기" style="font-size:.75rem;color:var(--accent);background:var(--surface);border:1px solid var(--border);padding:.3rem .6rem;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:4px;">🔃 새로고침</button>
    <div class="date-badge" id="today-badge"></div>
  </div>
</div>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchMain('input')">📥 보고 입력</button>
  <button class="main-tab" onclick="switchMain('today')">📊 오늘 현황</button>
  <button class="main-tab" onclick="switchMain('trend')">📈 추이 분석</button>
  <button class="main-tab" onclick="switchMain('daily')">📋 날짜별 기록</button>
</div>

<div id="tab-input">
  <div class="input-section">
    <div class="input-label">📋 보고서 입력</div>
    <div class="dept-tabs">
      <button class="dept-tab active" data-dept="자문회">자문회</button>
      <button class="dept-tab" data-dept="장년회">장년회</button>
      <button class="dept-tab" data-dept="부녀회">부녀회</button>
      <button class="dept-tab" data-dept="청년회">청년회</button>
    </div>
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:.5rem;">
        <label style="font-size:.82rem;font-weight:700;color:var(--muted);">📅 보고 날짜</label>
        <input type="date" id="report-date" style="padding:.5rem .9rem;border-radius:10px;border:1.5px solid var(--border);font-family:inherit;font-size:.9rem;outline:none;background:var(--surface2);color:var(--text);cursor:pointer;" />
      </div>
      <span style="font-size:.75rem;color:var(--muted);">* 전날 보고를 오늘 입력할 때 날짜를 변경하세요</span>
    </div>
    <textarea id="raw-input" placeholder="텔레그램 원문을 여기에 그대로 붙여넣으세요 (줄바꿈 있어도 없어도 가능)"></textarea>
    <div class="parse-preview" id="parse-preview">
      <div class="parse-preview-title">🔍 파싱 미리보기</div>
      <div id="preview-content"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="parseAndAdd()">✓ 집계에 추가</button>
      <button class="btn btn-secondary" onclick="loadSample('부녀회')">부녀회 샘플</button>
      <button class="btn btn-secondary" onclick="loadSample('자문회')">자문회 샘플</button>
      <button class="btn btn-secondary" onclick="loadSample('청년회')">청년회 샘플</button>
      <button class="btn btn-secondary" onclick="loadSample('장년회')">장년회 샘플</button>
      <button class="btn btn-danger" onclick="clearAll()">전체 초기화</button>
    </div>
  </div>
</div>

<div id="tab-today" style="display:none;">
  <div id="today-empty" class="empty-state" style="display:none;">
    <div class="empty-icon">⛪</div>
    <div class="empty-text">오늘 아직 보고서가 입력되지 않았어요.<br>보고 입력 탭에서 데이터를 추가해주세요.</div>
  </div>
  <div id="today-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.8rem;">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <!-- 조회 날짜 -->
        <div style="display:flex;align-items:center;gap:.5rem;">
          <label style="font-size:.82rem;font-weight:700;color:var(--text);">📅 조회 날짜</label>
          <select id="view-date" onchange="renderToday()"
            style="padding:.5rem .9rem;border-radius:10px;border:1.5px solid var(--accent);font-family:inherit;font-size:.9rem;font-weight:600;outline:none;background:var(--accent-light);color:var(--accent);cursor:pointer;min-width:160px;">
            <option value="">오늘 (최근 입력)</option>
          </select>
        </div>
        <!-- 비교 기준일 -->
        <div style="display:flex;align-items:center;gap:.5rem;">

<script>


const DEPT_COLORS = { 자문회:'--자문', 장년회:'--장년', 부녀회:'--부녀', 청년회:'--청년' };
const DEPT_RAW    = { 자문회:'#6d4aff', 장년회:'#0ea871', 부녀회:'#e8407a', 청년회:'#e07b00' };
const DEPT_BG     = { 자문회:'--자문-bg', 장년회:'--장년-bg', 부녀회:'--부녀-bg', 청년회:'--청년-bg' };
const RESULT_KEYS = ['신규찾기','연결','육따','영따','복음방','센터확답'];
const ALL_DEPTS   = ['자문회','장년회','부녀회','청년회'];

// results 구조 호환: {count:N} 또는 {N} 직접 숫자 모두 처리
function getRC(results, key) {
  if (!results || results[key] === undefined) return 0;
  const v = results[key];
  if (typeof v === 'object') return v.count || 0;
  return Number(v) || 0;
}

// ─ 스토리지 (Google Apps Script 백엔드) ─
let deptData = {};
let currentViewData = {}; // renderToday에서 설정
let history  = [];  // [{date, 자문회:{unique,t3,t2,t1,재적,groups,results}, ...}]
let storageReady = false;
let lastSyncAt = 0; // 마지막 동기화 시각 (ms)
const SYNC_STALE_MS = 60000; // 1분 이상 지나면 자동 갱신

// Google Apps Script 웹앱 URL (구글시트 백엔드)
const GAS_URL = 'https://script.google.com/macros/s/AKfycby_zVgeSrBGndUVRxgP89V3Zg9ELBAcdBeoULhkdL_kBxdUlxl41DGqNt6rGKLHiCk/exec';

// 공유 클라우드 저장소(구글시트)에서 로드
async function loadSharedData() {
  const syncEl = document.getElementById('sync-status');
  try {
    // GAS는 302 리다이렉트를 함 → redirect:'follow' + 최종 URL 직접 fetch
    // 먼저 redirect:'manual'로 최종 URL 파악 후 재요청
    const probeRes = await fetch(GAS_URL + '?key=all', {
      redirect: 'follow',
      method: 'GET',
    });
    const text = await probeRes.text();
    const json = JSON.parse(text);
    if (json.all) {
      const parsed = JSON.parse(json.all);
      deptData = parsed.deptData || {};
      history  = parsed.history  || [];
    } else {
      deptData = json.deptData ? JSON.parse(json.deptData) : {};
      history  = json.history  ? JSON.parse(json.history)  : [];
    }
    if (syncEl) syncEl.innerHTML = '✅ 공유 데이터 연결됨';
  } catch(e) {
    // fetch 실패 시 JSONP 폴백
    console.warn('fetch 실패, JSONP 폴백 시도:', e.message);
    await loadSharedDataJSONP();
    return;
  }
  storageReady = true;
  lastSyncAt = Date.now();
}

function loadSharedDataJSONP() {
  const syncEl = document.getElementById('sync-status');
  return new Promise((resolve) => {
    const cbName = '__gasCallback__';
    const timer = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById('gas-jsonp-script');
      if (s) s.remove();
      if (syncEl) syncEl.innerHTML = '⚠️ 연결 실패';
      storageReady = true;
      lastSyncAt = Date.now();
      resolve();
    }, 12000);

    window[cbName] = function(json) {
      clearTimeout(timer);
      delete window[cbName];
      const s = document.getElementById('gas-jsonp-script');
      if (s) s.remove();
      try {
        if (json.all) {
          const parsed = JSON.parse(json.all);
          deptData = parsed.deptData || {};
          history  = parsed.history  || [];
        } else {
          deptData = json.deptData ? JSON.parse(json.deptData) : {};
          history  = json.history  ? JSON.parse(json.history)  : [];
        }
        if (syncEl) syncEl.innerHTML = '✅ 공유 데이터 연결됨';
      } catch(e) {
        if (syncEl) syncEl.innerHTML = '⚠️ 데이터 오류';
      }
      storageReady = true;
      lastSyncAt = Date.now();
      resolve();
    };

    const s = document.createElement('script');
    s.id = 'gas-jsonp-script';
    s.src = GAS_URL + '?key=all&callback=__gasCallback__';
    s.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      if (syncEl) syncEl.innerHTML = '⚠️ 스크립트 로드 실패';
      storageReady = true;
      lastSyncAt = Date.now();
      resolve();
    };
    document.head.appendChild(s);
  });
}

// 공유 클라우드 저장소(구글시트)에 저장 — 단일 요청
async function saveSharedData() {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ key: 'all', value: JSON.stringify({ deptData: deptData, history: history }) })
    });
    lastSyncAt = Date.now();
  } catch(e) {
    console.error('공유 데이터 저장 실패', e);
    throw e;
  }
}

let currentDept = '자문회';
let currentPeriod = 'weekly';
let currentCompareDate = ''; // 비교 기준일 전역 유지
let currentMainTab = 'input';

const now = new Date();
// 날짜 피커 초기값 = 오늘
// 날짜 초기화는 init()에서 처리
document.getElementById('today-badge').textContent =
  `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

// ─────────────────────────────────────────────────────────────
// 핵심 파서 v3: 줄바꿈 유무, 다양한 구분자, 괄호 패턴 모두 처리
// ─────────────────────────────────────────────────────────────

// 노이즈 단어 — 이름으로 잘못 파싱되면 안 되는 단어들
const NOISE_WORDS = new Set([
  '명단','교사','인도자','기준','누적','찾기','만남','센터','관리','온라인',
  '대면','줌','생활','당근','소모임','이상','이하','모두','전화','번호',
  '약속','기간','개월','성경','공부','수강','이상','이하','주일','매주',
  '부서','일자','재적','보고','결과','활동','전도','전도단','센터관리',
  '신규','연결','육따','영따','복음방','확답','센터확답'
]);

function extractNames(str) {
  // 점(.)도 구분자로 처리, 괄호 안 내용 먼저 제거
  const cleaned = str
    .replace(/[（(][^)）]*[)）]/g, '')   // (괄호 내용) 전체 제거
    .replace(/대면:\d+\/줌:\d+/gi, '')   // 대면:3/줌:13
    .replace(/[.。·]/g, ' ')             // 점 → 공백 (장년회 구분자)
    .replace(/\d+/g, ' ');               // 숫자 제거

  return cleaned
    .split(/[,，\s　]+/)
    .map(s => s.trim())
    .filter(s => /^[가-힣]{2,5}$/.test(s) && !NOISE_WORDS.has(s));
}

// 결과 섹션 이름줄: "김연희(이금숙)" 형태에서 피전도자만 추출
function extractResultNames(str) {
  const names = [];
  // 패턴1: 이름(교사) — 피전도자가 앞
  const pattern1 = /([가-힣]{2,5})\s*[（(][가-힣]{2,5}[)）]/g;
  let m;
  while ((m = pattern1.exec(str)) !== null) {
    if (!NOISE_WORDS.has(m[1])) names.push(m[1]);
  }
  // 패턴1에서 못 찾았으면 일반 이름 추출 시도
  if (!names.length) {
    const cleaned = str
      .replace(/[（(][^)）]*[)）]/g, '')
      .replace(/명단/g, '');
    extractNames(cleaned).forEach(n => names.push(n));
  }
  return names;
}

function parseReport(raw) {
  const result = {
    dept: '', date: '', 재적: 0,
    groups: { 센터관리: [], 전도활동: [], 전도단: [] },
    results: {}
  };
  RESULT_KEYS.forEach(k => result.results[k] = { count: 0, names: [] });

  // 1단계: 이모지 제거 + 줄바꿈 정규화
  let text = raw
    .replace(/[\u{1F300}-\u{1FFFF}]/gu, ' ')
    .replace(/[📋📶✅]/g, ' ')
    .replace(/\r\n/g, '\n')
    .replace(/\r/g, '\n');

  // 2단계: 섹션 키워드 앞에 강제 줄바꿈 삽입
  // (줄바꿈 없이 붙어있는 원문 처리용)
  const SECTION_KW = [
    '부서', '일자', '재적',
    '전도활동보고', '전도결과보고',
    '센터관리', '전도활동', '전도단',
    '신규찾기', '연결', '육따', '영따', '복음방', '센터확답'
  ];
  SECTION_KW.forEach(kw => {
    // "키워드 :" 또는 "키워드:" 패턴 앞에 줄바꿈
    const re = new RegExp(`(?<!\n)(${kw}\\s*[：:])`, 'g');
    text = text.replace(re, '\n$1');
  });

  // 번호) 패턴 앞 줄바꿈
  text = text.replace(/(?<!\n)(\d+\))/g, '\n$1');

  // "- 한글" 앞 줄바꿈 (대시+이름이 붙어있을 때)
  text = text.replace(/(?<!\n)([-－]\s*[가-힣])/g, '\n$1');

  // ✅ 기준 섹션 이후는 무시 (보고 내용이 아님)
  const cutIdx = text.indexOf('✅');
  if (cutIdx > -1) text = text.substring(0, cutIdx);
  const cutIdx2 = text.search(/기준\s*\*/);
  if (cutIdx2 > -1) text = text.substring(0, cutIdx2);

  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  let mode = null;
  // mode: null | 'group:센터관리' | 'group:전도활동' | 'group:전도단' | 'result:KEY'

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // ── 메타 ──
    const deptM = line.match(/부서\s*[：:]\s*([가-힣]+)/);
    if (deptM) { result.dept = deptM[1]; continue; }

    const dateM = line.match(/일자\s*[：:]\s*(.+)/);
    if (dateM) { result.date = dateM[1].trim().replace(/\s/g,''); continue; }

    const rejeokM = line.match(/재적\s*[：:]\s*(\d+)/);
    if (rejeokM) { result.재적 = parseInt(rejeokM[1]); continue; }

    // ── 섹션 헤더 — 그룹 ──
    // 반드시 숫자) 패턴이거나 줄 시작이어야 진짜 헤더
    const isSectionHeader = /^\d+\)/.test(line) || /^[가-힣]/.test(line);

    if (isSectionHeader && /센터.?관리/.test(line) && !/결과/.test(line)) {
      mode = 'group:센터관리';
      // 같은 줄에 이름이 있는 경우 처리 (헤더 뒤에 바로 이름)
      const afterColon = line.replace(/.*센터.?관리\s*[：:]\s*\d*명?/, '');
      const ns = extractNames(afterColon);
      if (ns.length) result.groups.센터관리.push(...ns);
      continue;
    }
    if (isSectionHeader && /전도.?활동/.test(line) && !/결과/.test(line) && !/보고/.test(line)) {
      mode = 'group:전도활동';
      const afterColon = line.replace(/.*전도.?활동\s*[：:]\s*\d*명?/, '');
      const ns = extractNames(afterColon);
      if (ns.length) result.groups.전도활동.push(...ns);
      continue;
    }
    if (isSectionHeader && /전도단/.test(line) && !/결과/.test(line)) {
      mode = 'group:전도단';
      const afterColon = line.replace(/.*전도단\s*[：:]\s*\d*명?[^가-힣]*/, '');
      const ns = extractNames(afterColon);
      if (ns.length) result.groups.전도단.push(...ns);
      continue;
    }

    // ── 섹션 헤더 — 전도결과 ──
    let resultMatched = false;
    for (const key of RESULT_KEYS) {
      if (line.includes(key) && /\d+\s*명/.test(line)) {
        const cntM = line.match(/(\d+)\s*명/);
        result.results[key].count = cntM ? parseInt(cntM[1]) : 0;
        mode = 'result:' + key;
        resultMatched = true;
        // 같은 줄에 이름 있으면 추출
        const afterNum = line.replace(/.*\d+\s*명/, '');
        const ns = extractResultNames(afterNum);
        if (ns.length) result.results[key].names.push(...ns);
        break;
      }
    }
    if (resultMatched) continue;

    // "- 명단(인도자)" "- 명단(교사)" 같은 더미 줄 → 무시
    if (/^[-－]?\s*명단/.test(line)) continue;

    // ── 이름 줄 ──
    const startsWithDash = /^[-－]/.test(line);
    const looksLikeNames = /^[가-힣]/.test(line);

    if ((startsWithDash || looksLikeNames) && mode) {
      const content = line.replace(/^[-－]\s*/, '');

      if (mode.startsWith('group:')) {
        const grp = mode.replace('group:', '');
        const ns = extractNames(content);
        result.groups[grp].push(...ns);

      } else if (mode.startsWith('result:')) {
        const key = mode.replace('result:', '');
        const ns = extractResultNames(content);
        result.results[key].names.push(...ns);
      }
    }
  }

  // 중복 제거
  Object.keys(result.groups).forEach(g => {
    result.groups[g] = [...new Set(result.groups[g])];
  });
  RESULT_KEYS.forEach(k => {
    result.results[k].names = [...new Set(result.results[k].names)];
  });

  return result;
}


// ─ 미리보기 ─
document.getElementById('raw-input').addEventListener('input', function() {
  const text = this.value.trim();
  if (!text) { document.getElementById('parse-preview').style.display='none'; return; }
  const p = parseReport(text);
  const u = getUnique(p.groups);
  document.getElementById('parse-preview').style.display = 'block';

  // 중복 감지: 같은 그룹 안에서 중복, 그룹 간 중복 모두 표시
  const dupInfo = [];
  const GRP_KEYS = ['센터관리','전도활동','전도단'];

  // 그룹 내 중복
  GRP_KEYS.forEach(grp => {
    const seen = {}, dups = [];
    p.groups[grp].forEach(n => {
      if (seen[n]) { if (!dups.includes(n)) dups.push(n); }
      else seen[n] = true;
    });
    if (dups.length) dupInfo.push(`<span style="color:#dc2626;font-weight:700">[${grp} 내 중복]</span> ${dups.join(', ')}`);
  });

  // 그룹 간 중복 (실질 인원 감소 원인)
  const allNames = [...p.groups.센터관리, ...p.groups.전도활동, ...p.groups.전도단];
  const nameCount = {};
  allNames.forEach(n => nameCount[n] = (nameCount[n]||0) + 1);
  const crossDups = Object.keys(nameCount).filter(n => nameCount[n] > 1);
  if (crossDups.length) {
    const crossDetail = crossDups.map(n => {
      const inGroups = GRP_KEYS.filter(g => p.groups[g].includes(n));
      return `${n}(${inGroups.map(g=>g.replace('센터관리','센').replace('전도활동','전').replace('전도단','단')).join('·')})`;
    });
    dupInfo.push(`<span style="color:#d97706;font-weight:700">[그룹간 중복]</span> ${crossDetail.join(', ')}`);
  }

  const dupHtml = dupInfo.length
    ? `<div style="margin-top:.6rem;padding:.6rem .8rem;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:8px;font-size:.78rem;line-height:1.8">
        ⚠️ <strong>중복 감지 (실질인원에서 제외됨)</strong><br>
        ${dupInfo.join('<br>')}
       </div>`
    : `<div style="margin-top:.5rem;font-size:.75rem;color:#059669">✅ 중복 없음</div>`;

  document.getElementById('parse-preview').style.display = 'block';
  document.getElementById('preview-content').innerHTML = `
    <div class="parse-row">
      <span>부서 <strong>${p.dept||'(감지중)'}</strong></span>
      <span>재적 <strong>${p.재적}명</strong></span>
      <span>일자 <strong>${p.date||'-'}</strong></span>
    </div>
    <div class="parse-row">
      <span>센터관리 <strong>${p.groups.센터관리.length}명</strong></span>
      <span>전도활동 <strong>${p.groups.전도활동.length}명</strong></span>
      <span>전도단 <strong>${p.groups.전도단.length}명</strong></span>
      <span style="color:var(--accent)">→ 실질 <strong>${u.size}명</strong>
        ${allNames.length - u.size > 0 ? `<span style="color:#d97706;font-size:.75rem"> (${allNames.length - u.size}명 중복제외)</span>` : ''}
      </span>
    </div>
    <div class="parse-row" style="font-size:.75rem">
      ${RESULT_KEYS.map(k=>`<span>${k} <strong>${p.results[k].count}</strong></span>`).join('')}
    </div>
    ${dupHtml}`;
});

// ─ 유틸 ─
function getUnique(g){return new Set([...g.센터관리,...g.전도활동,...g.전도단]);}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
const DAY_KR = ['일','월','화','수','목','금','토'];
const DAY_COLOR = {'일':'#dc2626','월':'#2563eb','화':'#2563eb','수':'#dc2626','목':'#2563eb','금':'#2563eb','토':'#dc2626'};
function getDayKr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return DAY_KR[d.getDay()];
}
function dayBadge(dateStr) {
  const day = getDayKr(dateStr);
  const color = DAY_COLOR[day] || '#374151';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${color}18;color:${color};font-size:.72rem;font-weight:800;margin-left:5px">${day}</span>`;
}
function pct(n,d){return d?Math.round(n/d*100):0;}

async function manualRefresh() {
  const syncEl = document.getElementById('sync-status');
  if (syncEl) syncEl.innerHTML = '🔄 새로고침 중...';
  await loadSharedData();
  populateCompareDates();
  if (currentMainTab === 'today') renderToday();
  if (currentMainTab === 'trend') renderTrend(currentPeriod);
  if (currentMainTab === 'daily') renderDailyTable();
  if (syncEl) syncEl.innerHTML = '✅ 공유 데이터 연결됨';
}

function populateCompareDates() {
  const compareSel = document.getElementById('compare-date');
  const viewSel    = document.getElementById('view-date');
  const currentCompare = currentCompareDate || (compareSel ? compareSel.value : '');
  const currentView    = viewSel    ? viewSel.value    : '';
  const dates = [...history].sort((a,b)=>a.date<b.date?1:-1).map(r=>r.date);

  if (compareSel) {
    compareSel.innerHTML = '<option value="">비교 안 함</option>'
      + dates.map(d => `<option value="${d}"${d===currentCompare?' selected':''}>${d}</option>`).join('');
  }
  if (viewSel) {
    viewSel.innerHTML = '<option value="">오늘 (최근 입력)</option>'
      + dates.map(d => `<option value="${d}"${d===currentView?' selected':''}>${d}</option>`).join('');
  }
}

function calcTiers(groups){
  const u=getUnique(groups), pg={};
  ['센터관리','전도활동','전도단'].forEach(g=>groups[g].forEach(n=>{if(!pg[n])pg[n]=[];pg[n].push(g);}));
  const t3=[],t2=[],t1=[];
  [...u].forEach(n=>{const c=(pg[n]||[]).length;if(c>=3)t3.push(n);else if(c===2)t2.push(n);else t1.push(n);});
  return {unique:u.size,t3,t2,t1};
}

// ─ 탭 전환 ─
function switchMain(tab){
  currentMainTab=tab;
  if (!storageReady && tab !== 'input') {
    // 아직 로딩 중이면 잠시 대기 후 재시도
    setTimeout(() => switchMain(tab), 300);
    return;
  }
  ['input','today','trend','daily'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.main-tab').forEach((b,i)=>{
    b.classList.toggle('active',['input','today','trend','daily'][i]===tab);
  });
  if(tab!=='input') {
    populateCompareDates();
    if(tab==='today') renderToday();
    if(tab==='trend') renderTrend(currentPeriod);
    if(tab==='daily') renderDailyTable();
    // 1분 이상 지났으면 백그라운드 갱신 (렌더 막지 않음)
    if ((Date.now() - lastSyncAt) > SYNC_STALE_MS) {
      loadSharedData().then(() => {
        populateCompareDates();
        if(currentMainTab==='today') renderToday();
        if(currentMainTab==='trend') renderTrend(currentPeriod);
        if(currentMainTab==='daily') renderDailyTable();
      });
    }
  }
}

// ─ parseAndAdd ─
function parseAndAdd(){
  const text=document.getElementById('raw-input').value.trim();
  if(!text){alert('보고서를 입력해주세요');return;}
  const parsed=parseReport(text);
  const dept=ALL_DEPTS.includes(parsed.dept)?parsed.dept:currentDept;
  parsed.dept=dept;
  const tiers=calcTiers(parsed.groups);
  parsed.unique=tiers.unique;
  parsed.t3=tiers.t3; parsed.t2=tiers.t2; parsed.t1=tiers.t1;
  parsed.rawText=text;
  deptData[dept]=parsed;

  const reportDateEl=document.getElementById('report-date');
  const today=reportDateEl&&reportDateEl.value?reportDateEl.value:fmtDate(now);
  let row=history.find(h=>h.date===today);
  if(!row){row={date:today};history.push(row);}
  // 풍부한 구조로 저장: 명단까지 보관
  row[dept]={
    unique:tiers.unique, t3:tiers.t3.length, t2:tiers.t2.length, t1:tiers.t1.length,
    t3names:tiers.t3, t2names:tiers.t2, t1names:tiers.t1,
    재적:parsed.재적,
    groups:{센터관리:[...parsed.groups.센터관리],전도활동:[...parsed.groups.전도활동],전도단:[...parsed.groups.전도단]},
    results:RESULT_KEYS.reduce((o,k)=>{o[k]=parsed.results[k].count;return o;},{})
  };
  const syncEl0 = document.getElementById('sync-status');
  if (syncEl0) syncEl0.innerHTML = '🔄 저장 중...';
  saveSharedData().then(() => {
    if (syncEl0) syncEl0.innerHTML = '✅ 공유 데이터 연결됨';
  });
  // 저장 완료 토스트 + 오늘 현황 자동 이동
  showToast(`✅ ${dept} 집계 완료! 실질 ${tiers.unique}명`);
  setTimeout(() => switchMain('today'), 800);
  if(currentMainTab==='today') renderToday();
}

async function captureToday(mode) {
  const el = document.getElementById('today-capture-area');
  if (!el) return;

  const btn = event.currentTarget;
  const origText = btn.innerHTML;
  btn.innerHTML = '⏳ 처리 중...';
  btn.disabled = true;

  try {
    // 날짜 워터마크 추가
    const watermark = document.createElement('div');
    watermark.id = 'capture-watermark';
    const dateStr = fmtDate(now);
    watermark.style.cssText = 'text-align:right;padding:.5rem 1rem;font-size:.78rem;color:#9ca3af;font-family:DM Mono,monospace;';
    watermark.textContent = `전도활동 대시보드 · ${dateStr} 기준`;
    el.appendChild(watermark);

    const canvas = await html2canvas(el, {
      backgroundColor: '#f0f2f7',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: el.scrollWidth,
      scrollX: 0, scrollY: 0,
    });

    el.removeChild(watermark);

    if (mode === 'download') {
      const link = document.createElement('a');
      link.download = `전도활동_${dateStr}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.innerHTML = '✅ 저장 완료!';
    } else {
      // 클립보드 복사
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          btn.innerHTML = '✅ 복사 완료!';
        } catch(e) {
          // 클립보드 API 지원 안 할 경우 다운로드로 fallback
          const link = document.createElement('a');
          link.download = `전도활동_${dateStr}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          btn.innerHTML = '✅ 저장됨 (클립보드 미지원)';
        }
      }, 'image/png');
    }
  } catch(e) {
    btn.innerHTML = '❌ 오류 발생';
    console.error(e);
  }

  setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 2500);
}

};

function makeResultGrid(results, prevResults) {
  var steps = RESULT_KEYS.map(function(k) {
    return { key: k, cnt: getRC(results, k) };
  });
  var maxVal = Math.max.apply(null, steps.map(function(s){ return s.cnt; })) || 1;

  var html = '<div style="display:flex;align-items:stretch;gap:0;width:100%;">';
  steps.forEach(function(s, i) {
    var m = FUNNEL_META[s.key];
    var cnt = s.cnt;
    var pv = prevResults ? getRC(prevResults, s.key) : null;
    var diff = pv !== null ? cnt - pv : null;
    var diffHtml = diff === null ? ''
      : diff > 0 ? '<div style="color:#059669;font-size:.62rem;font-weight:700;margin-top:1px">&#9650;'+diff+'</div>'
      : diff < 0 ? '<div style="color:#dc2626;font-size:.62rem;font-weight:700;margin-top:1px">&#9660;'+Math.abs(diff)+'</div>'
      : '<div style="color:#9ca3af;font-size:.62rem;margin-top:1px">&#8594;</div>';
    var active = cnt > 0;
    var cardBg = active ? m.bg : '#f9fafb';
    var cardColor = active ? m.color : '#c0c4ce';
    var borderColor = active ? m.color + '55' : '#e5e7eb';
    var barH = cnt > 0 ? Math.max(3, Math.round(cnt / maxVal * 20)) : 3;
    var isLast = i === steps.length - 1;

    html += '<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;">';
    html += '<div style="width:100%;height:100px;background:'+cardBg+';border:1.5px solid '+borderColor+';border-radius:10px;padding:.5rem .25rem;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;">';
    html += '<div style="font-size:.9rem;line-height:1">'+m.icon+'</div>';
    html += '<div style="font-size:.65rem;color:'+cardColor+';font-weight:700;margin-top:3px;white-space:nowrap;">'+m.label+'</div>';
    html += '<div style="font-size:1.4rem;font-weight:900;font-family:DM Mono,monospace;color:'+cardColor+';line-height:1.2;margin-top:1px">'+cnt+'</div>';
    html += diffHtml;
    html += '<div style="margin-top:4px;height:3px;background:'+(active?m.color:'#e5e7eb')+';border-radius:2px;width:60%;"></div>';
    html += '</div>';
    html += '</div>';
    if (!isLast) {
      html += '<div style="flex-shrink:0;display:flex;align-items:center;padding:0 2px;color:#d1d5db;font-size:.8rem;margin-top:-8px;">&#8250;</div>';
    }
  });
  html += '</div>';
  return html;
}

function getGoalRate(dept) { return goals[dept] || DEFAULT_GOAL_RATE; }
function goalStatus(rate, goal) {
  if (rate >= goal) return { color:'#059669', label:'달성', icon:'✅' };
  if (rate >= goal * 0.7) return { color:'#d97706', label:'근접', icon:'🔶' };
  return { color:'#dc2626', label:'미달', icon:'❌' };
}
function getRejeok(dept, dataRejeok) {
  return rejeokOverride[dept] || dataRejeok || 0;
}


let processGoals = {};
try { processGoals = JSON.parse(localStorage.getItem('processGoals')||'{}'); } catch(e) {}
function saveProcessGoals() { localStorage.setItem('processGoals', JSON.stringify(processGoals)); }
const DEFAULT_RATES = [20, 50, 80, 80, 70];
function calcRequiredByStage(finalGoal, rates) {
  var req = [0,0,0,0,0,0]; req[5] = finalGoal;
  for (var i = 4; i >= 0; i--) { var rate = (rates[i]||DEFAULT_RATES[i])/100; req[i] = rate>0?Math.ceil(req[i+1]/rate):0; }
  return req;
}
function renderTrend(period){

  history.forEach(function(row){
    var key=periodKey(row.date,period);

    var label=periodLabel(key,period);
    var t3p=pct(totT3,totU),t2p=pct(totT2,totU),t1p=pct(totT1,totU);
    var deptCards=ALL_DEPTS.map(function(dept){
      var d=agg[dept];
      if(!d||!d.unique)return '<div class="mini-dept-card" style="border-top-color:'+DEPT_RAW[dept]+';opacity:.4"><div class="mini-dept-name" style="color:'+DEPT_RAW[dept]+'">'+dept+'</div><div style="font-size:.75rem;color:var(--muted)">데이터 없음</div></div>';

        +'<div class="mini-dept-rate">재적대비 '+pct(d.unique,d.재적||1)+'%</div>'
        +'<div class="mini-tier-bar"><div style="flex:'+t3n+';background:#dc2626;min-width:'+(t3n?2:0)+'px"></div><div style="flex:'+t2n+';background:#d97706;min-width:'+(t2n?2:0)+'px"></div><div style="flex:'+t1n+';background:#059669;min-width:'+(t1n?2:0)+'px"></div></div>'
        +'<div class="mini-tier-nums"><span style="color:#dc2626">총력 '+t3n+'</span><span style="color:#d97706">주력 '+t2n+'</span><span style="color:#059669">활력 '+t1n+'</span></div>'

        +'<div class="period-meta">데이터 '+rows.length+'일</div></div>'

        +'<div class="period-total-sub">전체 실질<br>'

        +'<span style="color:#059669;font-size:.72rem">활력 '+totT1+'</span></div></div>'
      +'</div>'
      +'<div class="tier-summary-bar">'
        +'<div class="tier-bar-track"><div class="tier-seg" style="flex:'+totT3+';background:#dc2626;min-width:'+(totT3?3:0)+'px"></div><div class="tier-seg" style="flex:'+totT2+';background:#d97706;min-width:'+(totT2?3:0)+'px"></div><div class="tier-seg" style="flex:'+totT1+';background:#059669;min-width:'+(totT1?3:0)+'px"></div></div>'

  const actRate=pct(totalUnique,totalRejeok);

  // 통계 카드
  const statsGrid=document.getElementById('stats-grid');
  const tiers=[
    {name:'총력',n:totalT3,c:'#dc2626',bg:'#fef2f2'},
    {name:'주력',n:totalT2,c:'#d97706',bg:'#fffbeb'},
    {name:'활력',n:totalT1,c:'#059669',bg:'#ecfdf5'},

  const bars=tiers.map(t=>`
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.75rem;font-weight:700;color:${t.c}">${t.name}</span>
        <span style="font-size:.75rem;font-family:'DM Mono',monospace;font-weight:700;color:${t.c}">${t.n}명 <span style="opacity:.7">(${pct(t.n,totalUnique)}%)</span></span>
      </div>
      <div style="height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct(t.n,totalUnique)}%;background:${t.c};border-radius:3px"></div>
      </div>
    </div>`).join('');
  // 이번 주 (월~일) 날짜 범위 계산
  const today0 = new Date(fmtDate(now) + 'T00:00:00');
  const weekStartDate = new Date(today0);
  weekStartDate.setDate(today0.getDate() - today0.getDay()); // 일요일(0) 기준
  const weekStartStr = fmtDate(weekStartDate);
  const weekEndStr   = fmtDate(today0);

  // 이번 주 history 행
  const thisWeekRows = history.filter(r => r.date >= weekStartStr && r.date <= weekEndStr);

  // 부서별 주간 일평균 계산
  const deptWeekAvg = {};
  ALL_DEPTS.forEach(dept => {
    const rows = thisWeekRows.filter(r => r[dept] && typeof r[dept]==='object' && r[dept].unique > 0);
    const dataRejeok = (viewData[dept] && viewData[dept].재적) || (rows[0] && rows[0][dept] && rows[0][dept].재적) || 0;
    const rejeok = getRejeok(dept, dataRejeok);
    const avgUnique = rows.length > 0 ? Math.round(rows.reduce((s,r)=>s+(r[dept].unique||0),0)/rows.length) : 0;
    deptWeekAvg[dept] = { avgUnique, rejeok, days: rows.length, rate: pct(avgUnique, rejeok) };
  });
  const weekDaysCount = [...new Set(thisWeekRows.map(r=>r.date))].length;

  // 목표달성률 카드 (주간 일평균 기준)
  const deptGoalCards = ALL_DEPTS.map(dept => {
    const wa = deptWeekAvg[dept];
    if (!wa || !wa.rejeok) return '';
    const goal = getGoalRate(dept);
    const status = goalStatus(wa.rate, goal);
    const progress = Math.min(Math.round(wa.rate/goal*100), 100);
    return `<div style="background:var(--surface2);border-radius:10px;padding:.7rem .9rem;border-left:3px solid ${status.color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

        <span>주간 일평균 ${wa.avgUnique}명 / 재적 ${wa.rejeok}명</span>
        <span>목표 ${goal}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:3px">
        <div style="height:100%;width:${progress}%;background:${status.color};border-radius:3px;transition:width .6s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted)">
        <span>${wa.days}일 보고됨 (${weekStartStr.slice(5)} ~ ${weekEndStr.slice(5)})</span>
        <span style="color:${status.color};font-weight:700">${progress}% 달성</span>
      </div>

  }).join('');

  statsGrid.innerHTML = `
    <div class="stat-card" style="border-left:4px solid #64748b">
      <div class="stat-label">전체 재적</div>
      <div class="stat-num" style="color:#64748b">${totalRejeok}명</div>
      <div class="stat-sub">4개 부서 합산</div>
    </div>
    <div class="stat-card" style="border-left:4px solid var(--accent)">

      <div class="stat-num" style="color:#d97706">${depts.length}/4</div>
      <div class="stat-sub">부서별 보고</div>

  // 목표 달성률 카드 추가

          <span class="intensity-badge" style="background:${tc};color:#fff">${label}</span>
          <span class="intensity-cnt" style="color:${tc}">
            <span style="font-size:1rem;font-weight:900">${names.length}명</span>
            <span style="font-size:.7rem;opacity:.75">실질 ${np}% · 재적 ${npr}%</span>
          </span>
        </div>
        <div class="intensity-names">${makeChips(names,cb,ct)}</div>
      </div>`;
    return`<div class="dept-card" style="border-top:4px solid ${DEPT_RAW[dept]}">
      <div class="dept-header">
        <div class="dept-name" style="color:${color}">${dept}</div>
        <div class="dept-badge" style="background:${bg};color:${color}">재적 ${d.재적}명 · ${d.date||''}</div>
      </div>
      <div class="dept-body">
        ${groupsHTML}
        <div class="unique-row" style="background:${bg}">
          <div>
            <div class="unique-label" style="color:${color}">실질 전도 인원</div>
            <div class="unique-sub" style="color:${color}">재적 대비 <strong>${rate}%</strong> · 총력 ${t3p}% 주력 ${t2p}% 활력 ${t1p}%</div>
          </div>
          <div class="unique-num" style="color:${color}">${u}명</div>
        </div>
        <div class="intensity-section">
          ${makeTier('총력 활동자',t3,'var(--총력-bg)','rgba(220,38,38,.12)','var(--총력)','var(--총력)',t3p,pct(t3.length,d.재적))}
          ${makeTier('주력 활동자',t2,'var(--주력-bg)','rgba(217,119,6,.12)','var(--주력)','var(--주력)',t2p,pct(t2.length,d.재적))}
          ${makeTier('활력 활동자',t1,'var(--활력-bg)','rgba(5,150,105,.1)','var(--활력)','var(--활력)',t1p,pct(t1.length,d.재적))}
        </div>

        <!-- 전도결과 -->
        <div style="margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1rem;">
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem;">전도결과</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;" id="results-${dept}">
            ${makeResultGrid(d.results, null)}
          </div>
        </div>
      </div></div>`;
  // ── 교회 전체 합산 카드는 아래에서 처리 ──
  deptGrid.innerHTML += `<div class="dept-card" style="border-top:4px solid #2563eb;grid-column:1/-1;">
    <div class="dept-header">
      <div class="dept-name" style="color:#2563eb">⛪ 교회 전체</div>
      <div class="dept-badge" style="background:#eff4ff;color:#2563eb">재적 ${totalRejeok}명 합산</div>
    </div>
    <div class="dept-body">
      ${['센터관리','전도활동','전도단'].map(makeGroupRowAll).join('')}
      <div class="unique-row" style="background:#eff4ff">
        <div style="width:100%">
          <div class="unique-label" style="color:#2563eb">실질 전도 인원</div>
          <div style="display:flex;align-items:baseline;gap:.5rem;margin-top:.3rem;flex-wrap:wrap">
            <div class="unique-num" style="color:#2563eb;line-height:1">${totalUnique}명</div>
            <div style="font-size:1rem;font-weight:700;color:#2563eb;opacity:.8">(재적대비 ${actRate}%)</div>
          </div>
          <div style="display:flex;gap:.6rem;margin-top:.6rem;flex-wrap:wrap">
            <span style="font-size:.78rem;font-weight:700;color:#dc2626;background:#fef2f2;padding:2px 8px;border-radius:6px">총력 ${totalT3p}%</span>
            <span style="font-size:.78rem;font-weight:700;color:#d97706;background:#fffbeb;padding:2px 8px;border-radius:6px">주력 ${totalT2p}%</span>
            <span style="font-size:.78rem;font-weight:700;color:#059669;background:#ecfdf5;padding:2px 8px;border-radius:6px">활력 ${totalT1p}%</span>
          </div>
        </div>
      </div>
      <div class="intensity-section">
        ${makeTierAll('총력 활동자',allT3names,'var(--총력-bg)','rgba(220,38,38,.12)','var(--총력)','var(--총력)',totalT3p,pct(totalT3,totalRejeok))}
        ${makeTierAll('주력 활동자',allT2names,'var(--주력-bg)','rgba(217,119,6,.12)','var(--주력)','var(--주력)',totalT2p,pct(totalT2,totalRejeok))}
        ${makeTierAll('활력 활동자',allT1names,'var(--활력-bg)','rgba(5,150,105,.1)','var(--활력)','var(--활력)',totalT1p,pct(totalT1,totalRejeok))}
      </div>
      <div style="margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1rem;">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem">전도결과</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">
          ${makeResultGrid(totalResults, null)}
        </div>
      </div>
    </div>
  </div>`;

  }).join('');

  // ── 교회 전체 합산 카드 ──
  const allT3names=[...new Set(ALL_DEPTS.flatMap(d=>{const dd=viewData[d];if(!dd)return[];return Array.isArray(dd.t3)?dd.t3:(dd.t3names||[]);}))];
  const allT2names=[...new Set(ALL_DEPTS.flatMap(d=>{const dd=viewData[d];if(!dd)return[];return Array.isArray(dd.t2)?dd.t2:(dd.t2names||[]);}))];
  const allT1names=[...new Set(ALL_DEPTS.flatMap(d=>{const dd=viewData[d];if(!dd)return[];return Array.isArray(dd.t1)?dd.t1:(dd.t1names||[]);}))];
  const totalT3p=pct(totalT3,totalUnique), totalT2p=pct(totalT2,totalUnique), totalT1p=pct(totalT1,totalUnique);
  const allGroups={
    센터관리:[...new Set(ALL_DEPTS.flatMap(d=>viewData[d]?.groups?.센터관리||[]))],
    전도활동:[...new Set(ALL_DEPTS.flatMap(d=>viewData[d]?.groups?.전도활동||[]))],
    전도단:[...new Set(ALL_DEPTS.flatMap(d=>viewData[d]?.groups?.전도단||[]))],
  };
  const makeChipsAll=(names,bg,tc)=>names.map(n=>`<span class="i-chip" style="background:${bg};color:${tc}">${n}</span>`).join('');
  const makeTierAll=(label,names,blk,cb,ct,tc,np,npr)=>!names.length?'':
    `<div class="intensity-block" style="background:${blk}">
      <div class="intensity-header">
        <span class="intensity-badge" style="background:${tc};color:#fff">${label}</span>
        <span class="intensity-cnt" style="color:${tc}">
          <span style="font-size:1rem;font-weight:900">${names.length}명</span>
          <span style="font-size:.7rem;opacity:.75">실질 ${np}% · 재적 ${npr}%</span>
        </span>
      </div>
      <div class="intensity-names">${makeChipsAll(names,cb,ct)}</div>
    </div>`;

  if(depts.length) deptGrid.innerHTML += `<div class="dept-card" style="border-top:4px solid #2563eb;">
    <div class="dept-header">
      <div class="dept-name" style="color:#2563eb">⛪ 교회 전체</div>
      <div class="dept-badge" style="background:#eff4ff;color:#2563eb">재적 ${totalRejeok}명 합산</div>
    </div>
    <div class="dept-body">
      ${['센터관리','전도활동','전도단'].map(grp=>`
        <div class="group-row"><div class="group-top">
          <div class="group-name">${grp}</div>
          <div class="group-count" style="color:#2563eb">${allGroups[grp].length}
            <span style="font-size:.72rem;font-weight:400;color:var(--muted);margin-left:4px">(재적대비 ${pct(allGroups[grp].length,totalRejeok)}%)</span>
          </div>
        </div></div>`).join('')}
      <div class="unique-row" style="background:#eff4ff">
        <div style="width:100%">
          <div class="unique-label" style="color:#2563eb">실질 전도 인원</div>
          <div style="display:flex;align-items:baseline;gap:.5rem;margin-top:.3rem;flex-wrap:wrap">
            <div class="unique-num" style="color:#2563eb;line-height:1">${totalUnique}명</div>
            <div style="font-size:1rem;font-weight:700;color:#2563eb;opacity:.8">(재적대비 ${actRate}%)</div>
          </div>
          <div style="display:flex;gap:.6rem;margin-top:.6rem;flex-wrap:wrap">
            <span style="font-size:.78rem;font-weight:700;color:#dc2626;background:#fef2f2;padding:2px 8px;border-radius:6px">총력 ${totalT3p}%</span>
            <span style="font-size:.78rem;font-weight:700;color:#d97706;background:#fffbeb;padding:2px 8px;border-radius:6px">주력 ${totalT2p}%</span>
            <span style="font-size:.78rem;font-weight:700;color:#059669;background:#ecfdf5;padding:2px 8px;border-radius:6px">활력 ${totalT1p}%</span>
          </div>
        </div>
      </div>
      <div class="intensity-section">
        ${makeTierAll('총력 활동자',allT3names,'var(--총력-bg)','rgba(220,38,38,.12)','var(--총력)','var(--총력)',totalT3p,pct(totalT3,totalRejeok))}
        ${makeTierAll('주력 활동자',allT2names,'var(--주력-bg)','rgba(217,119,6,.12)','var(--주력)','var(--주력)',totalT2p,pct(totalT2,totalRejeok))}
        ${makeTierAll('활력 활동자',allT1names,'var(--활력-bg)','rgba(5,150,105,.1)','var(--활력)','var(--활력)',totalT1p,pct(totalT1,totalRejeok))}
      </div>
      <div style="margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1rem;">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:.8rem">전도결과</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">
          ${makeResultGrid(totalResults, null)}
        </div>
      </div>
    </div>
  </div>`;

  // 전도 프로세스 종합 뷰
  renderProcessView(totalResults);
  // 전도 활동 종합 뷰
  currentViewData = viewData;
  renderActivityOverview();

  // 조회 날짜 배너
  const bannerEl = document.getElementById('view-date-banner');
  if (bannerEl) {
    bannerEl.style.display = viewLabel ? 'flex' : 'none';
    bannerEl.textContent = viewLabel ? '📅 ' + viewLabel + ' 기준 데이터' : '';
  }
}


function renderActivityOverview() {
  const el = document.getElementById('activity-overview');
  if (!el) return;

  // 비교 기준일: compare-date 셀렉트에서 선택한 날짜
  const compareSel = document.getElementById('compare-date');
  const compareDate = compareSel ? compareSel.value : '';
  const prevRow = compareDate
    ? (history.find(r => r.date === compareDate) || null)
    : null;

  // 색상 규칙:
  // - 셀 배경 = 부서 고유색 (연하게)
  // - 숫자 색  = 지표 고유색 (실질:파랑 총력:빨강 주력:황금 활력:초록)
  const COL_COLOR = ['#2563eb','#dc2626','#d97706','#059669','#7c3aed'];
  const COL_LABEL = ['실질인원','총력','주력','활력','활동력지수'];

  function diffBadge(cur, prev) {
    if (prev === null) return '';
    const d = cur - prev;
    if (d > 0) return '<div style="color:#059669;font-size:.6rem;font-weight:700;margin-top:1px">▲'+d+'</div>';
    if (d < 0) return '<div style="color:#dc2626;font-size:.6rem;font-weight:700;margin-top:1px">▼'+Math.abs(d)+'</div>';
    return '<div style="color:#9ca3af;font-size:.6rem;margin-top:1px">→</div>';
  }

  function activityIndex(t3, t2, t1) {
    const total = t3 + t2 + t1;
    if (!total) return 0;
    return Math.round((t3*3 + t2*2 + t1*1) / total * 10) / 10;
  }
  function indexGrade(idx) {
    if (idx >= 2.5) return { label:'고강도', color:'#dc2626', bg:'#fef2f2' };
    if (idx >= 1.8) return { label:'중강도', color:'#d97706', bg:'#fffbeb' };
    if (idx >= 1.0) return { label:'저강도', color:'#059669', bg:'#ecfdf5' };
    return { label:'-', color:'#9ca3af', bg:'#f9fafb' };
  }

  function makeRow(label, labelColor, labelSub, vals, prevVals, bgHex, isBold, rejeok) {
    // vals: [unique, t3, t2, t1]
    const u=vals[0], t3=vals[1], t2=vals[2], t1=vals[3];
    const idx = activityIndex(t3, t2, t1);
    const grade = indexGrade(idx);
    const pidx = prevVals ? activityIndex(prevVals[1]||0, prevVals[2]||0, prevVals[3]||0) : null;
    const idxDiff = pidx !== null ? Math.round((idx - pidx)*10)/10 : null;

    const cells = vals.map(function(v, i) {
      const pv = prevVals ? prevVals[i] : null;
      const numColor = COL_COLOR[i];
      const rateVal = i === 0 ? pct(v, rejeok||0) : pct(v, vals[0]);
      const rateLabel = i === 0 ? '재적 '+rateVal+'%' : '실질 '+rateVal+'%';

      const diff = (pv !== null && pv !== undefined) ? v - pv : null;
      const diffColor = diff === null ? null : diff > 0 ? '#059669' : diff < 0 ? '#dc2626' : '#9ca3af';
      const diffIcon  = diff === null ? '' : diff > 0 ? '▲' : diff < 0 ? '▼' : '→';
      const diffAbs   = diff === null ? '' : Math.abs(diff);
      const diffBlock = diff === null ? ''
        : '<div style="display:inline-flex;align-items:center;gap:3px;background:'+diffColor+'18;border-radius:8px;padding:2px 8px;margin-top:5px">'
          + '<span style="color:'+diffColor+';font-size:.85rem;font-weight:800">'+diffIcon+(diff!==0?diffAbs:'')+'</span>'
          + '</div>';

      return '<td style="padding:.7rem .5rem;text-align:center">'
        + '<div style="background:'+bgHex+'18;border-radius:12px;padding:.8rem .4rem;border-left:3px solid '+numColor+(isBold?'99':'44')+'">'
        + '<div style="font-size:'+(isBold?'2':'1.7')+'rem;font-weight:900;font-family:DM Mono,monospace;color:'+numColor+';line-height:1">'+v+'</div>'
        + '<div style="font-size:'+(isBold?'1rem':'.9rem')+';font-weight:800;color:'+numColor+';margin-top:5px;opacity:.85">'+rateLabel+'</div>'
        + diffBlock
        + '</div></td>';
    }).join('');

    // 스택 바
    const total = t3+t2+t1 || 1;
    const t3w = Math.round(t3/total*100), t2w = Math.round(t2/total*100), t1w = 100-t3w-t2w;
    const stackBar = u > 0
      ? '<div style="height:8px;border-radius:4px;overflow:hidden;display:flex;gap:1px;margin-top:6px">'
        + '<div style="flex:'+t3w+';background:#dc2626;min-width:'+(t3?2:0)+'px"></div>'
        + '<div style="flex:'+t2w+';background:#d97706;min-width:'+(t2?2:0)+'px"></div>'
        + '<div style="flex:'+t1w+';background:#059669;min-width:'+(t1?2:0)+'px"></div>'
        + '</div>'
      : '';

    // 활동력 지수 셀
    const idxDiffHtml = idxDiff === null ? ''
      : '<div style="display:inline-flex;align-items:center;gap:3px;background:'+(idxDiff>0?'#05996918':idxDiff<0?'#dc262618':'#9ca3af18')+';border-radius:8px;padding:2px 8px;margin-top:5px">'
        + '<span style="color:'+(idxDiff>0?'#059669':idxDiff<0?'#dc2626':'#9ca3af')+';font-size:.85rem;font-weight:800">'
        + (idxDiff>0?'▲':idxDiff<0?'▼':'→')+(idxDiff!==0?Math.abs(idxDiff):'')+'</span></div>';

    const idxCell = '<td style="padding:.7rem .5rem;text-align:center">'
      + '<div style="background:'+grade.bg+';border-radius:12px;padding:.8rem .4rem;border-left:3px solid '+grade.color+(isBold?'99':'66')+'">'
      + '<div style="font-size:'+(isBold?'2':'1.7')+'rem;font-weight:900;font-family:DM Mono,monospace;color:'+grade.color+';line-height:1">'+(idx||'-')+'</div>'
      + '<div style="font-size:'+(isBold?'1rem':'.9rem')+';font-weight:800;color:'+grade.color+';margin-top:5px;opacity:.85">'+grade.label+' / 3.0</div>'
      + idxDiffHtml
      + stackBar
      + '</div></td>';
    return '<tr style="border-bottom:1px solid var(--border)'+(isBold?';background:#f0f4ff;border-top:2px solid #bfdbfe':'')+'">'
      + '<td style="padding:.9rem 1.1rem;white-space:nowrap;vertical-align:middle">'
      + '<div style="font-weight:'+(isBold?'900':'800')+';font-size:'+(isBold?'1.15rem':'1.05rem')+';color:'+labelColor+'">'+label+'</div>'
      + '<div style="font-size:.82rem;color:var(--muted);margin-top:3px;font-weight:500">'+labelSub+'</div>'
      + '</td>'
      + cells + idxCell + '</tr>';
  }

  // 부서별 행
  const deptRows = ALL_DEPTS.map(function(dept) {
    const d = currentViewData[dept];
    const pv = prevRow ? prevRow[dept] : null;
    const u  = d ? (d.unique||0) : 0;
    const t3 = d ? (Array.isArray(d.t3)?d.t3.length:(d.t3||0)) : 0;
    const t2 = d ? (Array.isArray(d.t2)?d.t2.length:(d.t2||0)) : 0;
    const t1 = d ? (Array.isArray(d.t1)?d.t1.length:(d.t1||0)) : 0;
    const pu  = pv&&typeof pv==='object'?pv.unique:null;
    const pt3 = pv&&typeof pv==='object'?pv.t3:null;
    const pt2 = pv&&typeof pv==='object'?pv.t2:null;
    const pt1 = pv&&typeof pv==='object'?pv.t1:null;
    const color = DEPT_RAW[dept];
    // hex to rgb용 — 이미 hex로 있으니 그냥 사용
    return d
      ? makeRow(dept, color, '재적 '+d.재적+'명', [u,t3,t2,t1], [pu,pt3,pt2,pt1], color, false, d.재적)
      : '<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:.7rem 1rem;font-weight:800;font-size:.92rem;color:'+color+'">'+dept
        +'<div style="font-size:.68rem;color:var(--muted)">미입력</div></td>'
        +'<td colspan="4" style="text-align:center;color:var(--muted);font-size:.82rem;padding:.7rem">-</td></tr>';
  }).join('');

  // 전체 합계 행
  const totU  = ALL_DEPTS.reduce((s,d)=>s+(currentViewData[d]?.unique||0),0);
  const totRej= ALL_DEPTS.reduce((s,d)=>s+(currentViewData[d]?.재적||0),0);
  const totT3 = ALL_DEPTS.reduce((s,d)=>{const dd=currentViewData[d];return s+(dd?Array.isArray(dd.t3)?dd.t3.length:(dd.t3||0):0);},0);
  const totT2 = ALL_DEPTS.reduce((s,d)=>{const dd=currentViewData[d];return s+(dd?Array.isArray(dd.t2)?dd.t2.length:(dd.t2||0):0);},0);
  const totT1 = ALL_DEPTS.reduce((s,d)=>{const dd=currentViewData[d];return s+(dd?Array.isArray(dd.t1)?dd.t1.length:(dd.t1||0):0);},0);
  const ptotU = prevRow?ALL_DEPTS.reduce((s,d)=>s+(prevRow[d]?.unique||0),0):null;
  const ptotT3= prevRow?ALL_DEPTS.reduce((s,d)=>s+(prevRow[d]?.t3||0),0):null;
  const ptotT2= prevRow?ALL_DEPTS.reduce((s,d)=>s+(prevRow[d]?.t2||0),0):null;
  const ptotT1= prevRow?ALL_DEPTS.reduce((s,d)=>s+(prevRow[d]?.t1||0),0):null;
  const totalRow = makeRow('⛪ 교회 전체','#2563eb','재적 '+totRej+'명',
    [totU,totT3,totT2,totT1],[ptotU,ptotT3,ptotT2,ptotT1],'#2563eb',true,totRej);

  el.innerHTML = '<div class="result-section" style="margin-bottom:1.5rem">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem">'
    + '<div class="section-title" style="margin-bottom:0">전도 활동 종합</div>'
    + (prevRow ? '<span style="font-size:.75rem;color:var(--accent);background:var(--accent-light);border:1px solid #bfdbfe;padding:3px 10px;border-radius:999px;font-weight:600">'+prevRow.date+' 대비 증감</span>' : '<span style="font-size:.75rem;color:var(--muted)">위에서 비교 기준일을 선택하세요</span>')
    + '</div>'
    + '<div style="overflow-x:auto">'
    + '<table style="width:100%;border-collapse:collapse;min-width:480px">'
    + '<thead><tr style="border-bottom:2px solid var(--border)">'
    + '<th style="padding:.8rem 1rem;text-align:left;font-size:.85rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;min-width:100px">부서</th>'
    + COL_COLOR.map(function(c,i){return '<th style="padding:.8rem .5rem;text-align:center;font-size:.88rem;font-weight:800;color:'+c+';min-width:100px">'+COL_LABEL[i]+'</th>';}).join('')
    + '</tr></thead>'
    + '<tbody>'+deptRows+totalRow+'</tbody>'
    + '</table></div></div>';
}

function renderProcessView(totalResults) {
  const el = document.getElementById('process-view');
  if (!el) return;

  // 비교 기준일: compare-date 셀렉트에서 선택한 날짜
  const compareSel = document.getElementById('compare-date');
  const compareDate = compareSel ? compareSel.value : '';
  const prevRow = compareDate
    ? (history.find(r => r.date === compareDate) || null)
    : null;
  const prevLabel = prevRow ? prevRow.date : null;

  const STEP_LABELS = ['1. 찾기','2. 연결','3. 육따','4. 영따','5. 복방','6. 센터'];
  const STEP_COLORS = ['#2563eb','#7c3aed','#b45309','#0369a1','#047857','#be185d'];
  const STEP_BG     = ['#eff4ff','#f5f3ff','#fffbeb','#f0f9ff','#ecfdf5','#fdf2f8'];

  // 부서별 목표 역산
  var pg2 = processGoals || {};
  var pg2Rates = pg2.rates || DEFAULT_RATES;
  var deptReqMap = {}; // {dept: [req0..5]}
  ALL_DEPTS.forEach(function(dept) {
    var dg = pg2.deptGoals && pg2.deptGoals[dept] ? pg2.deptGoals[dept] : 0;
    deptReqMap[dept] = dg > 0 ? calcRequiredByStage(dg, pg2Rates) : null;
  });

  function stepCell(val, prev, color, bg, label, stepIdx, dept) {
    var diff = prev !== null ? val - prev : null;
    var diffHtml = diff === null ? ''
      : diff > 0 ? '<div style="font-size:.62rem;color:#059669;font-weight:700">▲'+diff+'</div>'
      : diff < 0 ? '<div style="font-size:.62rem;color:#dc2626;font-weight:700">▼'+Math.abs(diff)+'</div>'
      : '<div style="font-size:.62rem;color:#9ca3af">→</div>';
    var active = val > 0;
    // 부서별 목표 게이지
    var deptGoalBar = '';
    if (dept && deptReqMap[dept] && stepIdx !== undefined) {
      var reqV = deptReqMap[dept][stepIdx];
      if (reqV > 0) {
        var ap = Math.min(Math.round(val/reqV*100), 100);
        var ac = ap>=100?'#059669':ap>=70?'#d97706':'#dc2626';
        deptGoalBar = '<div style="margin-top:4px;border-top:1px solid #f0f0f0;padding-top:3px">'

            +'<span style="font-size:.6rem;font-weight:800;color:'+ac+'">'+ap+'%</span>'
          +'</div>'
          +'<div style="height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden">'
            +'<div style="height:100%;width:'+ap+'%;background:'+ac+'"></div>'
          +'</div>'
        +'</div>';
      }
    }
    return '<td style="padding:.5rem .3rem;text-align:center;min-width:70px">'
      + '<div style="background:'+(active?bg:'#f9fafb')+';border:1.5px solid '+(active?color+'55':'#e5e7eb')+';border-radius:10px;padding:.5rem .3rem;display:inline-block;width:100%;box-sizing:border-box">'
      + '<div style="font-size:.6rem;color:'+(active?color:'#b0b7c3')+';font-weight:700;margin-bottom:2px">'+label+'</div>'
      + '<div style="font-size:1.4rem;font-weight:900;font-family:DM Mono,monospace;color:'+(active?color:'#c0c4ce')+';line-height:1.1">'+val+'</div>'
      + diffHtml + deptGoalBar
      + '</div></td>';
  }

  function arrowCell() {
    return '<td style="padding:0 2px;text-align:center;color:#d1d5db;font-size:1rem;vertical-align:middle">›</td>';
  }

  // 부서별 행
  var deptRows = ALL_DEPTS.map(function(dept) {
    // currentViewData 없으면 deptData(오늘 입력) 폴백
    var d = (currentViewData && currentViewData[dept] && currentViewData[dept].unique)
      ? currentViewData[dept]
      : deptData[dept];
    var color = DEPT_RAW[dept];
    var prevDeptRow = prevRow ? prevRow[dept] : null;
    // 신규찾기: history에서 누적 합계, 나머지: 현재 보유
    var deptHistSum신규 = history.reduce(function(s,r){ return s + getRC(r[dept] && r[dept].results, '신규찾기'); }, 0);
    var cells = RESULT_KEYS.map(function(k, i) {
      var val = (i === 0)
        ? deptHistSum신규           // 찾기: 누적 합계
        : (d ? getRC(d.results, k) : 0); // 연결~센터: 독립 보유 인원
      var prevVal = prevDeptRow && typeof prevDeptRow === 'object' ? getRC(prevDeptRow.results, k) : null;
      return stepCell(val, prevVal, STEP_COLORS[i], STEP_BG[i], STEP_LABELS[i], i, dept) + (i < RESULT_KEYS.length-1 ? arrowCell() : '');
    }).join('');
    return '<tr>'

  }).join('');

  // 전체 합계 행
  var prevTotalRes = prevRow ? RESULT_KEYS.reduce(function(o,k){
    o[k] = ALL_DEPTS.reduce(function(s,d){ return s + getRC(prevRow[d]?.results, k); }, 0);
    return o;
  }, {}) : null;

  // 병목 분석: 직전 단계 대비 가장 많이 떨어진 구간
  var vals = RESULT_KEYS.map(function(k){ return totalResults[k]||0; });
  // bottleneck은 effectiveResults 기반으로 아래에서 계산

  // 역산 목표 (rawArr는 effectiveResults 선언 후 아래에서 계산)
  var pg = processGoals || {};
  var pgRates = pg.rates || DEFAULT_RATES;
  var pgFinal = pg.finalGoal || 0;
  var reqArr = pgFinal > 0 ? calcRequiredByStage(pgFinal, pgRates) : null;

  // 신규찾기: history 전체 누적 합계
  var histSumShinGyu = history.reduce(function(s,r){
    return s + ALL_DEPTS.reduce(function(ss,d){ return ss + getRC(r[d] && r[d].results, '신규찾기'); }, 0);
  }, 0);

  // totalResults도 currentViewData 없으면 deptData 폴백
  var effectiveResults = {};
  RESULT_KEYS.forEach(function(k) {
    if (k === '신규찾기') {
      effectiveResults[k] = histSumShinGyu;
    } else {
      // currentViewData 합산
      var cvSum = ALL_DEPTS.reduce(function(s,dept) {
        var v = currentViewData[dept] || deptData[dept];
        if (!v || !v.results) return s;
        var rv = v.results[k];
        return s + (typeof rv === 'object' ? (rv.count||0) : (rv||0));
      }, 0);
      effectiveResults[k] = cvSum || totalResults[k] || 0;
    }
  });

  // effectiveResults 기반 병목 분석
  var rawArr = RESULT_KEYS.map(function(k){ return effectiveResults[k]||0; });
  var bottleneck = -1, maxDrop = 0;
  for (var bi = 1; bi < rawArr.length; bi++) {
    if (rawArr[bi-1] > 0) {
      var drop = rawArr[bi-1] - rawArr[bi];
      if (drop > maxDrop) { maxDrop = drop; bottleneck = bi; }
    }
  }

  // effectiveResults 기반 rawArr + 병목 분석
  var rawArr = RESULT_KEYS.map(function(k){ return effectiveResults[k]||0; });
  var bottleneck2 = -1, maxDrop2 = 0;
  for (var bi = 1; bi < rawArr.length; bi++) {
    if (rawArr[bi-1] > 0) {
      var bdrop = rawArr[bi-1] - rawArr[bi];
      if (bdrop > maxDrop2) { maxDrop2 = bdrop; bottleneck2 = bi; }
    }
  }
  var bottleneck = bottleneck2, maxDrop = maxDrop2;

    // rawArr + 병목 분석 (effectiveResults 기반)
  var rawArr = RESULT_KEYS.map(function(k){ return effectiveResults[k]||0; });
  var bottleneck = -1, maxDrop = 0;
  for (var bi2 = 1; bi2 < rawArr.length; bi2++) {
    if (rawArr[bi2-1] > 0) {
      var bdrop2 = rawArr[bi2-1] - rawArr[bi2];
      if (bdrop2 > maxDrop) { maxDrop = bdrop2; bottleneck = bi2; }
    }
  }

  var totalCells = RESULT_KEYS.map(function(k, i) {
    var val = effectiveResults[k]; // 각 단계 독립 보유 인원
    var netVal = val;
    var prevVal = prevTotalRes ? prevTotalRes[k] : null;
    var isBottleneck = i === bottleneck && maxDrop > 0;
    var reqVal = reqArr ? reqArr[i] : null;
    var diff = prevVal !== null ? val - prevVal : null;
    var diffHtml = diff === null ? ''
      : diff > 0 ? '<div style="font-size:.65rem;color:#059669;font-weight:700">▲'+diff+'</div>'
      : diff < 0 ? '<div style="font-size:.65rem;color:#dc2626;font-weight:700">▼'+Math.abs(diff)+'</div>'
      : '<div style="font-size:.65rem;color:#9ca3af">→</div>';
    var active = val > 0;
    var color = STEP_COLORS[i], bg = STEP_BG[i];
    var goalBar = '';
    if (reqVal && reqVal > 0) {
      var achievePct = Math.min(Math.round(val/reqVal*100), 100);
      var achieveColor = achievePct >= 100 ? '#059669' : achievePct >= 70 ? '#d97706' : '#dc2626';
      goalBar = '<div style="margin-top:4px;border-top:1px solid #f0f0f0;padding-top:3px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">'
          + '<span style="font-size:.55rem;color:var(--muted)">목표 '+reqVal+'</span>'
          + '<span style="font-size:.65rem;font-weight:800;color:'+achieveColor+'">'+achievePct+'%</span>'
        + '</div>'
        + '<div style="height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden">'
          + '<div style="height:100%;width:'+achievePct+'%;background:'+achieveColor+';border-radius:2px"></div>'
        + '</div>'
      + '</div>';
    }
    var netLabel = ''; // val 자체가 차감값이므로 별도 표시 불필요

    return '<td style="padding:.5rem .3rem;text-align:center;min-width:70px">'
      + '<div style="background:'+(active?bg:'#f9fafb')+';border:2px solid '+(isBottleneck?'#dc2626':active?color+'55':'#e5e7eb')+';border-radius:10px;padding:.6rem .3rem;display:inline-block;width:100%;box-sizing:border-box;position:relative">'
      + (isBottleneck ? '<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;font-size:.55rem;font-weight:800;padding:1px 6px;border-radius:999px;white-space:nowrap">단절</div>' : '')
      + '<div style="font-size:.62rem;color:'+(active?color:'#b0b7c3')+';font-weight:700;margin-bottom:2px">'+STEP_LABELS[i]+'</div>'
      + '<div style="font-size:1.6rem;font-weight:900;font-family:DM Mono,monospace;color:'+(active?color:'#c0c4ce')+';line-height:1.1">'+val+'</div>'
      + netLabel + diffHtml + goalBar
      + '</div></td>'
      + (i < RESULT_KEYS.length-1 ? '<td style="padding:0 2px;text-align:center;vertical-align:middle"><div style="color:'+(isBottleneck?'#dc2626':'#d1d5db')+';font-size:1.2rem;font-weight:900">→</div></td>' : '');
  }).join('');

  el.innerHTML = '<div style="overflow-x:auto">'
    + '<table style="width:100%;border-collapse:collapse;min-width:600px">'
    + '<thead><tr>'
    + '<th style="padding:.5rem 1rem;text-align:left;font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border)">부서</th>'
    + RESULT_KEYS.map(function(k,i){ return '<th colspan="2" style="padding:.5rem .3rem;text-align:center;font-size:.7rem;font-weight:700;color:'+STEP_COLORS[i]+';border-bottom:2px solid var(--border)">'+STEP_LABELS[i]+'</th>'; }).join('').replace(/<th colspan="2"([^>]*)>([^<]*)<\/th>$/, '<th$1>$2</th>')
    + '</tr></thead>'
    + '<tbody>' + deptRows + '</tbody>'
    + '</table>'
    + '<div style="margin-top:1.2rem;background:#fff5f5;border:2px solid #fca5a5;border-radius:14px;padding:1.2rem">'
    + '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem">'
    + '<span style="background:#dc2626;color:#fff;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:999px">TOTAL</span>'
    + '<span style="font-size:.85rem;font-weight:700;color:#dc2626">전체 합계 · 프로세스 병목 분석</span>'
    + (prevRow ? '<span style="font-size:.72rem;color:var(--muted);margin-left:auto">'+prevRow.date+' 대비 증감</span>' : '')
    + '</div>'
    + '<div style="display:flex;align-items:center;font-size:1rem;font-weight:800;color:#dc2626;margin-bottom:.8rem">전체 합계</div>'
    + '<table style="width:100%;border-collapse:collapse"><tbody><tr>' + totalCells + '</tr></tbody></table>'
    + '</div>'
    + '</div>';
}

// ══════════════════════════════════════════════════════
// 날짜 유틸
// ══════════════════════════════════════════════════════
function weekStart(dateStr){
  const d=new Date(dateStr); d.setDate(d.getDate()-d.getDay()); return fmtDate(d);
}
function weekEnd(dateStr){
  const d=new Date(dateStr); d.setDate(d.getDate()+(6-d.getDay())); return fmtDate(d);
}
function periodKey(dateStr,period){
  if(period==='weekly') return weekStart(dateStr);
  if(period==='monthly') return dateStr.slice(0,7);
  if(period==='quarterly'){const[y,m]=dateStr.split('-').map(Number);return`${y}-Q${Math.ceil(m/3)}`;}
  return dateStr.slice(0,4);
}
function periodLabel(key,period){
  if(period==='weekly'){const e=weekEnd(key+'T00:00:00');return`${key.slice(5)} ~ ${e.slice(5)}`;}
  if(period==='monthly'){const[y,m]=key.split('-');return`${y}년 ${m}월`;}
  if(period==='quarterly')return key.replace('-','년 ');
  return key+'년';
}

// 기간 집계 (숫자 평균 + 명단 합집합)
function aggregatePeriod(rows){
  const result={};
  ALL_DEPTS.forEach(dept=>{
    const entries=rows.filter(r=>r[dept]&&typeof r[dept]==='object');
    if(!entries.length){result[dept]=null;return;}
    const days=entries.length;
    const avg=f=>entries.reduce((s,r)=>s+(r[dept]?.[f]||0),0)/days;
    // 명단: 해당 기간에 한 번이라도 나온 사람 합집합
    const allT3=new Set(entries.flatMap(r=>r[dept]?.t3names||[]));
    const allT2=new Set(entries.flatMap(r=>r[dept]?.t2names||[]));
    const allT1=new Set(entries.flatMap(r=>r[dept]?.t1names||[]));
    const allCentre=new Set(entries.flatMap(r=>r[dept]?.groups?.센터관리||[]));
    const allEv=new Set(entries.flatMap(r=>r[dept]?.groups?.전도활동||[]));
    const allTeam=new Set(entries.flatMap(r=>r[dept]?.groups?.전도단||[]));
    result[dept]={
      unique:avg('unique'), t3:avg('t3'), t2:avg('t2'), t1:avg('t1'),
      t3names:[...allT3], t2names:[...allT2], t1names:[...allT1],
      groups:{센터관리:[...allCentre],전도활동:[...allEv],전도단:[...allTeam]},
      재적:entries[0][dept]?.재적||0, days
    };
  });
  return result;
}

function renderDayOfWeekView() {
  const el = document.getElementById('trend-content');
